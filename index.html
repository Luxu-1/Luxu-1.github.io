<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>His teeth are fractals</title>
  <link rel="icon" type="image/png" href="icon.ico">
  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Botón de música fijo */
    .controls {
      position: fixed;
      top: 15px;
      right: 20px;
      font-size: 35px;
      color: white;
      cursor: pointer;
      user-select: none;
      z-index: 10;
    }

    img {
      cursor: pointer;
      max-width: 100%;
      height: auto;
    }

    /* Símbolo secreto "?" */
    .secret {
      position: fixed;
      bottom: 15px;
      left: 15px;
      font-size: 25px;
      color: rgba(255, 255, 255, 0.005);
      cursor: pointer;
      user-select: none;
      z-index: 5;
      transition: color 0.3s ease;
    }

    .secret:hover {
      color: rgba(255, 255, 255, 0.3);
    }

    /* IMAGEN OCULTA EN ESQUINA SUPERIOR IZQUIERDA */
    .hidden-image {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 100px;
      opacity: 0.03;
      transition: opacity 0.5s ease;
      z-index: 4;
    }

    .hidden-image:hover {
      opacity: 0.85;
    }

    .hidden-image img {
      width: 100%;
      height: auto;
      filter: brightness(0.8);
    }
  </style>
</head>
<body>

  <!-- Control de audio -->
  <div class="controls" onclick="toggleAudio()" id="audio-toggle">🔇</div>

  <!-- Símbolo secreto -->
  <a class="secret" href="https://luxu-1.github.io/gnik.html">?</a>

  <!-- Imagen oculta -->
  <a class="hidden-image" href="Nightmare-On-Schizo-Land.html">
    <img src="https://luxu-1.github.io/NoS.png" alt="Hidden">
  </a>

  <!-- GIF cliqueable -->
  <a href="https://luxu-1.github.io/hat.html">
    <img src="https://luxu-1.github.io/KING.gif" alt="Gif animado">
  </a>

  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="https://luxu-1.github.io/DEVICE_KING.mp3" type="audio/mpeg">
    Tu navegador no soporta audio en HTML5.
  </audio>

  <script>
    const audio = document.getElementById("bg-music");
    const toggle = document.getElementById("audio-toggle");
    let isPlaying = false;

    function toggleAudio() {
      if (!isPlaying) {
        audio.play().then(() => {
          isPlaying = true;
          toggle.textContent = "🎵";
        }).catch(err => {
          console.log("Autoplay bloqueado:", err);
        });
      } else {
        audio.pause();
        isPlaying = false;
        toggle.textContent = "🔇";
      }
    }
  </script>

</body>
</html>
