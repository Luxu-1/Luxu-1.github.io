<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>slatcarf era hteet siH</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    body {
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .controls {
      position: fixed;
      top: 15px;
      right: 20px;
      font-size: 35px;
      color: black;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      font-family: sans-serif;
    }

    img {
      max-width: 80%;
      max-height: 80%;
      cursor: default;
    }

    /* Símbolo para volver al índice */
    .back {
      position: fixed;
      bottom: 15px;
      left: 15px;
      font-size: 28px;
      color: rgba(0, 0, 0, 0.02);
      cursor: pointer;
      user-select: none;
      z-index: 5;
      transition: color 0.3s ease;
      text-decoration: none;
      font-family: sans-serif;
    }

    .back:hover {
      color: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <!-- Control de audio -->
  <div class="controls" onclick="toggleAudio()" id="audio-toggle">♫</div>

  <!-- Símbolo para volver al índice -->
  <a class="back" href="/views/index.html">◀</a>

  <!-- GIF alternativo (ya no es cliqueable, solo decorativo) -->
  <img src="/media/texture/GNIK.gif" alt="Gif alternativo">

  <!-- Audio alternativo -->
  <audio id="bg-music" loop>
    <source src="/media/sound/GNIK_ECIVED.mp3" type="audio/mpeg">
    Tu navegador no soporta audio en HTML5.
  </audio>

  <script>
    const audio = document.getElementById("bg-music");
    const toggle = document.getElementById("audio-toggle");
    let isPlaying = false;

    function toggleAudio() {
      if (!isPlaying) {
        audio.play().then(() => {
          isPlaying = true;
          toggle.textContent = "♬";
        }).catch(err => {
          console.log("Autoplay bloqueado:", err);
        });
      } else {
        audio.pause();
        isPlaying = false;
        toggle.textContent = "♫";
      }
    }
  </script>
</body>
</html>
