<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>His teeth are fractals</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Botón de música fijo */
    .controls {
      position: fixed;
      top: 15px;
      right: 20px;
      font-size: 35px;
      color: white;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      font-family: sans-serif; /* Para que los símbolos se vean bien */
    }

    img {
      cursor: pointer;
      max-width: 100%;
      height: auto;
    }

    /* Símbolo secreto "✦" */
    .secret {
      position: fixed;
      bottom: 15px;
      left: 15px;
      font-size: 28px;
      color: rgba(255, 255, 255, 0);
      cursor: pointer;
      user-select: none;
      z-index: 5;
      transition: color 0.3s ease;
      text-decoration: none;
      font-family: sans-serif;
    }

    .secret:hover {
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <!-- Control de audio (símbolos musicales) -->
  <div class="controls" onclick="toggleAudio()" id="audio-toggle">♫</div>

  <!-- Símbolo secreto: enlace a gnik.html -->
  <a class="secret" href="/views/gnik.html">?</a>

  <!-- GIF cliqueable que lleva a hat.html -->
  <a href="/views/hat.html">
    <img src="/media/texture/KING.gif" alt="Gif animado">
  </a>

  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="/media/sound/DEVICE_KING.mp3" type="audio/mpeg">
    Tu navegador no soporta audio en HTML5.
  </audio>

  <script>
    const audio = document.getElementById("bg-music");
    const toggle = document.getElementById("audio-toggle");
    let isPlaying = false;

    function toggleAudio() {
      if (!isPlaying) {
        audio.play().then(() => {
          isPlaying = true;
          toggle.textContent = "♬"; // cambia a nota doble cuando suena
        }).catch(err => {
          console.log("Autoplay bloqueado:", err);
        });
      } else {
        audio.pause();
        isPlaying = false;
        toggle.textContent = "♫"; // vuelve a la nota simple cuando está en pausa
      }
    }
  </script>
</body>
</html>
