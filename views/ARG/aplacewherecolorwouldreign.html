<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>His Fantasy</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    .container {
      position: relative;
      width: 90vmin;
      height: 90vmin;
      max-width: 800px;
      max-height: 800px;
      background-color: black;
      border: 2px solid #333;
      cursor: pointer;
      overflow: hidden;
      image-rendering: pixelated;
    }

    /* Imagen oculta: siempre visible pero tapada por el canvas */
    #hidden-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 1;               /* ← Ahora siempre visible */
      z-index: 1;
      background-color: black;  /* ← Fondo negro para transparencias */
    }

    /* Capa de rasgado (canvas) */
    #scratch-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      cursor: pointer;
      touch-action: none;
    }

    .instruction {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.1);
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 3;
      pointer-events: none;
      text-transform: uppercase;
      transition: opacity 0.8s ease;
      font-family: 'Courier New', monospace;
    }

    .final-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      text-align: center;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
    }

    .final-message.show {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .final-message:hover {
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
    }

    .progress {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.05);
      font-size: 12px;
      z-index: 3;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <!-- Imagen siempre visible debajo del canvas -->
    <img id="hidden-image" src="/media/texture/hiccolor.png" alt="Imagen oculta pixelada">
    <canvas id="scratch-canvas"></canvas>
    <div class="progress" id="progress">0%</div>
    </div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('container');
      const canvas = document.getElementById('scratch-canvas');
      const ctx = canvas.getContext('2d');
      const hiddenImg = document.getElementById('hidden-image');
      const instruction = document.getElementById('instruction');
      const progress = document.getElementById('progress');
      const finalMsg = document.getElementById('final-message');
      
      let isDrawing = false;
      let isRevealed = false;
      const threshold = 0.70;

      // Tamaño del "píxel" de rasgado (cuadrados)
      const PIXEL_SIZE = 12; // Ajusta este valor para cambiar el tamaño del grano

      function resizeCanvas() {
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        
        // Rellenar el canvas de negro (capa opaca)
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        updateProgress();
      }

      // Función de rasgado con cuadrados (estilo pixel art)
      function scratch(x, y) {
        if (isRevealed) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        // Coordenadas en el canvas
        const cx = (x - rect.left) * scaleX;
        const cy = (y - rect.top) * scaleY;
        
        // Dibujar un cuadrado (píxel) en modo "destination-out" para borrar
        ctx.globalCompositeOperation = 'destination-out';
        const half = PIXEL_SIZE / 2;
        ctx.fillRect(cx - half, cy - half, PIXEL_SIZE, PIXEL_SIZE);
        ctx.globalCompositeOperation = 'source-over';
        
        updateProgress();
      }

      function updateProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        let transparent = 0;
        
        // Contar píxeles transparentes (alfa < 128)
        for (let i = 3; i < data.length; i += 4) {
          if (data[i] < 128) transparent++;
        }
        
        const total = data.length / 4;
        const percent = Math.min(100, Math.round((transparent / total) * 100));
        progress.textContent = percent + '%';
        
        if (percent >= threshold * 100 && !isRevealed) {
          revealComplete();
        }
      }

      function revealComplete() {
        isRevealed = true;
        instruction.style.opacity = '0';
        progress.style.opacity = '0';
        // La imagen ya es visible, solo mostramos el mensaje
        setTimeout(() => {
          finalMsg.classList.add('show');
        }, 300);
      }

      // Eventos de mouse
      function onMouseDown(e) {
        if (isRevealed) return;
        isDrawing = true;
        const pos = getEventPos(e);
        scratch(pos.x, pos.y);
        instruction.style.opacity = '0.3';
      }

      function onMouseMove(e) {
        if (!isDrawing || isRevealed) return;
        const pos = getEventPos(e);
        scratch(pos.x, pos.y);
      }

      function onMouseUp() {
        isDrawing = false;
      }

      // Eventos táctiles
      function onTouchStart(e) {
        e.preventDefault();
        if (isRevealed) return;
        const touch = e.touches[0];
        const pos = getEventPos(touch);
        isDrawing = true;
        scratch(pos.x, pos.y);
      }

      function onTouchMove(e) {
        e.preventDefault();
        if (!isDrawing || isRevealed) return;
        const touch = e.touches[0];
        const pos = getEventPos(touch);
        scratch(pos.x, pos.y);
      }

      function onTouchEnd() {
        isDrawing = false;
      }

      function getEventPos(e) {
        const rect = container.getBoundingClientRect();
        return {
          x: e.clientX,
          y: e.clientY
        };
      }

      // Clic en mensaje final o en el contenedor (cuando está revelado)
      finalMsg.addEventListener('click', function() {
        if (isRevealed) {
          window.location.href = '/views/hat.html';
        }
      });

      container.addEventListener('click', function(e) {
        if (isRevealed) {
          window.location.href = '/views/hat.html';
        }
      });

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      canvas.addEventListener('mousedown', onMouseDown);
      canvas.addEventListener('mousemove', onMouseMove);
      canvas.addEventListener('mouseup', onMouseUp);
      canvas.addEventListener('mouseleave', onMouseUp);
      
      canvas.addEventListener('touchstart', onTouchStart, { passive: false });
      canvas.addEventListener('touchmove', onTouchMove, { passive: false });
      canvas.addEventListener('touchend', onTouchEnd, { passive: false });

      console.log('✦ Rasga la oscuridad...');
    })();
  </script>
</body>
</html>
