<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>His Fantasy</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background-color: #0A0A07;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    .container {
      position: relative;
      width: 90vmin;
      height: 90vmin;
      max-width: 800px;
      max-height: 800px;
      background-color: black;
      border: 2px solid #333;
      cursor: pointer;
      overflow: hidden;
      image-rendering: pixelated;
    }

    #hidden-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 1;
      z-index: 1;
      background-color: black;
    }

    #scratch-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      cursor: pointer;
      touch-action: none;
    }

    /* Solo el porcentaje, sin textos extra */
    .progress {
      position: absolute;
      bottom: 20px;               /* Lo subimos un poco */
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-size: 16px;
      z-index: 3;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: opacity 0.8s ease;
    }

    /* El mensaje final ahora es un simple destello sin texto */
    .final-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      background-color: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: background-color 0.3s ease;
    }

    .final-flash.show {
      background-color: rgba(255, 255, 255, 0.08);
      pointer-events: auto;
      cursor: pointer;
    }

    .final-flash.show:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img id="hidden-image" src="/media/texture/hiccolor.png" alt="Imagen oculta">
    <canvas id="scratch-canvas"></canvas>
    <div class="progress" id="progress">0%</div>
    <div class="final-flash" id="final-flash"></div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('container');
      const canvas = document.getElementById('scratch-canvas');
      const ctx = canvas.getContext('2d');
      const progressEl = document.getElementById('progress');
      const finalFlash = document.getElementById('final-flash');
      
      let isDrawing = false;
      let isRevealed = false;
      const threshold = 0.45;
      const PIXEL_SIZE = 12;

      function resizeCanvas() {
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        updateProgress();
      }

      function scratch(x, y) {
        if (isRevealed) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const cx = (x - rect.left) * scaleX;
        const cy = (y - rect.top) * scaleY;
        
        ctx.globalCompositeOperation = 'destination-out';
        const half = PIXEL_SIZE / 2;
        ctx.fillRect(cx - half, cy - half, PIXEL_SIZE, PIXEL_SIZE);
        ctx.globalCompositeOperation = 'source-over';
        
        updateProgress();
      }

      function updateProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        let transparent = 0;
        
        for (let i = 3; i < data.length; i += 4) {
          if (data[i] < 128) transparent++;
        }
        
        const total = data.length / 4;
        const percent = Math.min(100, Math.round((transparent / total) * 100));
        progressEl.textContent = percent + '%';
        
        if (percent >= threshold * 100 && !isRevealed) {
          revealComplete();
        }
      }

      function revealComplete() {
        isRevealed = true;
        
        // Autocompletar
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';
        
        progressEl.textContent = '100%';
        progressEl.style.opacity = '0.3'; // se atenúa pero sigue visible
        
        // Mostrar el flash final (área cliqueable)
        setTimeout(() => {
          finalFlash.classList.add('show');
        }, 300);
      }

      // Eventos de mouse
      function onMouseDown(e) {
        if (isRevealed) return;
        isDrawing = true;
        const pos = getEventPos(e);
        scratch(pos.x, pos.y);
      }

      function onMouseMove(e) {
        if (!isDrawing || isRevealed) return;
        const pos = getEventPos(e);
        scratch(pos.x, pos.y);
      }

      function onMouseUp() {
        isDrawing = false;
      }

      function onTouchStart(e) {
        e.preventDefault();
        if (isRevealed) return;
        const touch = e.touches[0];
        const pos = getEventPos(touch);
        isDrawing = true;
        scratch(pos.x, pos.y);
      }

      function onTouchMove(e) {
        e.preventDefault();
        if (!isDrawing || isRevealed) return;
        const touch = e.touches[0];
        const pos = getEventPos(touch);
        scratch(pos.x, pos.y);
      }

      function onTouchEnd() {
        isDrawing = false;
      }

      function getEventPos(e) {
        const rect = container.getBoundingClientRect();
        return {
          x: e.clientX,
          y: e.clientY
        };
      }

      // Clic en el flash final redirige
      finalFlash.addEventListener('click', function() {
        if (isRevealed) {
          window.location.href = '/views/hat.html';
        }
      });

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      canvas.addEventListener('mousedown', onMouseDown);
      canvas.addEventListener('mousemove', onMouseMove);
      canvas.addEventListener('mouseup', onMouseUp);
      canvas.addEventListener('mouseleave', onMouseUp);
      
      canvas.addEventListener('touchstart', onTouchStart, { passive: false });
      canvas.addEventListener('touchmove', onTouchMove, { passive: false });
      canvas.addEventListener('touchend', onTouchEnd, { passive: false });

      console.log('✦ Rasga la oscuridad (sin textos)');
    })();
  </script>
</body>
</html>
