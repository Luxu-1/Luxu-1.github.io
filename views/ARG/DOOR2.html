<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Him</title>
    <style>
        /* Reset y fondo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a0a;
            width: 100vw;
            height: 100vh;
            font-family: sans-serif;
        }

        /* Lienzo del caleidoscopio */
        #kaleidoscope {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }

        /* Contenedor del gato (clickeable) */
        #cat-container {
            position: fixed;
            width: 48px;
            height: 48px;
            cursor: pointer;
            z-index: 999;
            display: none;
            /* Se mezcla con el fondo gracias a la opacidad y ausencia de fondo sólido */
            opacity: 0.65;
            pointer-events: auto;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.15));
            transition: opacity 0.3s ease;
        }
        #cat-container:hover {
            opacity: 0.95;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
        }

        /* SVG del gato */
        #cat-container svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Animación de "disparado" (aparece con efecto explosivo) */
        .cat-pop {
            animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% {
                transform: scale(0) rotate(720deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 0.65;
            }
        }

        /* Animación al esconderse */
        .cat-hide {
            animation: fadeOut 0.5s ease-in forwards;
        }
        @keyframes fadeOut {
            0% {
                transform: scale(1);
                opacity: 0.65;
            }
            100% {
                transform: scale(0.3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Caleidoscopio -->
    <canvas id="kaleidoscope"></canvas>

    <!-- Gato amarillo "disparado" -->
    <div id="cat-container">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <!-- Cara principal (amarillo dorado) -->
            <circle cx="24" cy="26" r="16" fill="#FFD700" stroke="#B8860B" stroke-width="1.8" />
            <!-- Orejas -->
            <polygon points="10,14 16,10 14,20" fill="#FFD700" stroke="#B8860B" stroke-width="1.8" />
            <polygon points="38,14 32,10 34,20" fill="#FFD700" stroke="#B8860B" stroke-width="1.8" />
            <!-- Interior orejas (rosado) -->
            <polygon points="12,15 15,12 14,18" fill="#FFB6C1" />
            <polygon points="36,15 33,12 34,18" fill="#FFB6C1" />
            <!-- Ojos -->
            <circle cx="18" cy="24" r="3.5" fill="#1a1a1a" />
            <circle cx="30" cy="24" r="3.5" fill="#1a1a1a" />
            <!-- Pupilas brillantes -->
            <circle cx="17" cy="23" r="1.2" fill="#ffffff" />
            <circle cx="29" cy="23" r="1.2" fill="#ffffff" />
            <!-- Nariz y boca -->
            <path d="M 22 29 Q 24 33 26 29" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round" />
            <polygon points="23,27 25,27 24,29" fill="#FF6B6B" />
            <!-- Bigotes -->
            <line x1="6" y1="27" x2="15" y2="28" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" />
            <line x1="6" y1="31" x2="15" y2="30" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" />
            <line x1="42" y1="27" x2="33" y2="28" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" />
            <line x1="42" y1="31" x2="33" y2="30" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" />
            <!-- Cejas (toque divertido) -->
            <path d="M 14 20 Q 18 18 22 20" stroke="#B8860B" stroke-width="1.5" fill="none" stroke-linecap="round" />
            <path d="M 34 20 Q 30 18 26 20" stroke="#B8860B" stroke-width="1.5" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <script>
        // =============================================
        // 1. CALEIDOSCOPIO
        // =============================================
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, radius;

        function resizeCanvas() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            cx = W / 2;
            cy = H / 2;
            radius = Math.min(W, H) * 0.88;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Paleta de colores bien definidos y vibrantes
        const palette = [
            '#FF0033', '#00FF33', '#0033FF', '#FFFF00', '#FF00FF', '#00FFFF',
            '#FF8800', '#8800FF', '#33FF00', '#FF0088', '#00FF88', '#FFCC00',
            '#FF3366', '#33FF66', '#6633FF', '#FF6633', '#33FFCC', '#CC33FF'
        ];

        // Generar formas para el caleidoscopio
        const NUM_SHAPES = 130;
        const shapes = [];
        for (let i = 0; i < NUM_SHAPES; i++) {
            shapes.push({
                baseX: Math.random() * radius * 1.1,
                baseY: (Math.random() - 0.5) * radius * 1.6,
                size: Math.random() * 24 + 6,
                color: palette[Math.floor(Math.random() * palette.length)],
                type: Math.floor(Math.random() * 3) // 0: círculo, 1: cuadrado, 2: triángulo
            });
        }

        let angle = 0;
        const slices = 8;
        const sliceAngle = (Math.PI * 2) / slices;

        function drawKaleidoscope() {
            // Fondo oscuro para que los colores resalten
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            for (let i = 0; i < slices; i++) {
                ctx.save();
                // Rotamos al centro de cada sector
                ctx.rotate(i * sliceAngle + sliceAngle / 2);

                // Recortamos el sector (desde -mitad hasta +mitad del ángulo)
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, -sliceAngle / 2, sliceAngle / 2);
                ctx.closePath();
                ctx.clip();

                // Invertir en espejo cada dos sectores para el efecto caleidoscopio
                if (i % 2 === 1) {
                    ctx.scale(-1, 1);
                }

                // Dibujar todas las formas dentro del sector
                shapes.forEach(s => {
                    // Movimiento orgánico: las formas respiran y se desplazan lentamente
                    const x = s.baseX + Math.sin(angle * 1.2 + s.baseY * 0.04) * 18;
                    const y = s.baseY + Math.cos(angle * 1.2 + s.baseX * 0.04) * 18;

                    ctx.fillStyle = s.color;
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.lineWidth = 0.8;

                    ctx.beginPath();
                    if (s.type === 0) { // Círculo
                        ctx.arc(x, y, s.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    } else if (s.type === 1) { // Cuadrado
                        ctx.fillRect(x - s.size / 2, y - s.size / 2, s.size, s.size);
                        ctx.strokeRect(x - s.size / 2, y - s.size / 2, s.size, s.size);
                    } else { // Triángulo
                        ctx.moveTo(x, y - s.size);
                        ctx.lineTo(x + s.size, y + s.size);
                        ctx.lineTo(x - s.size, y + s.size);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
                });

                ctx.restore();
            }

            ctx.restore();

            // Incrementar ángulo para movimiento infinito
            angle += 0.005;
            requestAnimationFrame(drawKaleidoscope);
        }

        drawKaleidoscope();

        // =============================================
        // 2. LÓGICA DEL GATO (aparece/dispare y redirige)
        // =============================================
        const catContainer = document.getElementById('cat-container');
        let catTimeout = null;
        let hideTimeout = null;
        let attempts = 0;
        const MAX_ATTEMPTS = 5;
        const VISIBLE_TIME = 8000; // 8 segundos visible

        // Obtener posición aleatoria dentro de la pantalla
        function getRandomPosition() {
            const size = 48;
            const left = Math.random() * (window.innerWidth - size);
            const top = Math.random() * (window.innerHeight - size);
            return { left, top };
        }

        // Mostrar el gato con efecto "disparado"
        function showCat() {
            const pos = getRandomPosition();
            catContainer.style.left = pos.left + 'px';
            catContainer.style.top = pos.top + 'px';
            catContainer.style.display = 'block';

            // Reiniciar animación para que siempre haga el pop
            catContainer.classList.remove('cat-pop', 'cat-hide');
            // Forzar reflow para reiniciar la animación
            void catContainer.offsetWidth;
            catContainer.classList.add('cat-pop');

            // Programar ocultamiento automático si no se cliquea
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                hideCat();
            }, VISIBLE_TIME);
        }

        // Ocultar el gato y programar la siguiente aparición
        function hideCat() {
            catContainer.classList.remove('cat-pop');
            catContainer.classList.add('cat-hide');

            // Esperar a que termine la animación de ocultamiento
            setTimeout(() => {
                catContainer.style.display = 'none';
                // Reiniciamos el ciclo
                scheduleCat();
            }, 500);
        }

        // Programar la próxima oportunidad de aparición (probabilidad aleatoria)
        function scheduleCat() {
            clearTimeout(catTimeout);
            // Delay aleatorio entre 3 y 9 segundos
            const delay = Math.random() * 6000 + 3000;

            catTimeout = setTimeout(() => {
                attempts++;
                // Probabilidad del 20% de aparecer, o forzar si se superan los intentos máximos
                if (Math.random() < 0.20 || attempts >= MAX_ATTEMPTS) {
                    // ¡Aparece! Reiniciamos contador
                    attempts = 0;
                    showCat();
                } else {
                    // No apareció, volvemos a intentar
                    scheduleCat();
                }
            }, delay);
        }

        // Click en el gato -> redirige a la ruta solicitada
        catContainer.addEventListener('click', function(e) {
            e.stopPropagation();
            // Redirigir a views/ARG/688715.html
            window.location.href = 'views/ARG/688715.html';
        });

        // Iniciar el ciclo de apariciones
        scheduleCat();

        // Si la ventana cambia de tamaño, reubicamos el gato si está visible para que no quede fuera
        window.addEventListener('resize', function() {
            if (catContainer.style.display !== 'none' && !catContainer.classList.contains('cat-hide')) {
                const pos = getRandomPosition();
                catContainer.style.left = pos.left + 'px';
                catContainer.style.top = pos.top + 'px';
            }
        });

        // =============================================
        // 3. PEQUEÑO TRUCO: si el usuario hace clic en el fondo, no pasa nada
        // =============================================
        canvas.addEventListener('click', function(e) {
            // Intencionalmente vacío para no interferir con el gato
        });

        console.log('🚀 DOOR2.html cargado. Busca al gato amarillo...');
    </script>
</body>
</html>
