<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Him</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            width: 100vw;
            height: 100vh;
        }
        #kaleidoscope {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
        }
        #cat-container {
            position: fixed;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 999;
            display: none;
            opacity: 0.3;
            filter: blur(1.5px) drop-shadow(0 0 2px rgba(255, 255, 0, 0.2));
            pointer-events: auto;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }
        #cat-container:hover {
            opacity: 0.7;
            filter: blur(0px) drop-shadow(0 0 8px rgba(255, 255, 0, 0.8));
        }
        #cat-container svg {
            display: block;
            width: 100%;
            height: 100%;
        }
        .cat-pop {
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(360deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
        }
        .cat-hide {
            animation: fadeOut 0.6s ease-in forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.2); }
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    <div id="cat-container">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="18" fill="rgb(255, 255, 0)" />
            <polygon points="6,14 16,6 12,22" fill="rgb(255, 255, 0)" />
            <polygon points="42,14 32,6 36,22" fill="rgb(255, 255, 0)" />
        </svg>
    </div>

    <script>
        // =============================================
        // 1. CALEIDOSCOPIO MÚLTIPLE Y CAÓTICO
        // =============================================
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Paleta de colores vivos, sin negro
        const palette = [
            '#FF0055', '#FF8800', '#FFCC00', '#00FF66', '#00CCFF', '#FF00AA',
            '#FF5500', '#AAFF00', '#00FFCC', '#FF0066', '#6600FF', '#FFAA00',
            '#00FF99', '#FF3399', '#33FFCC', '#FF9933', '#33CCFF', '#FF66CC',
            '#FF3366', '#66FF33', '#FF33CC', '#33FF66', '#CC33FF', '#FFCC33'
        ];

        // Definir múltiples centros de caleidoscopio (6 centros)
        const centers = [];
        const NUM_CENTERS = 6;
        const baseRadius = Math.min(W, H) * 0.35; // radio de cada caleidoscopio

        // Posiciones distribuidas en la pantalla (fijas pero se pueden reubicar en resize)
        function initCenters() {
            centers.length = 0;
            // Distribución: 2 filas x 3 columnas
            const cols = 3;
            const rows = 2;
            const spacingX = W / (cols + 1);
            const spacingY = H / (rows + 1);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cx = spacingX * (c + 1);
                    const cy = spacingY * (r + 1);
                    const radius = Math.min(W, H) * 0.28; // un poco menos para que no se solapen demasiado
                    // Cada centro tendrá su propio conjunto de formas y ángulo
                    const shapes = [];
                    const NUM_SHAPES_PER_CENTER = 30; // total 180 formas (menos que antes, pero más centros)
                    for (let i = 0; i < NUM_SHAPES_PER_CENTER; i++) {
                        shapes.push({
                            baseX: (Math.random() - 0.5) * radius * 1.6,
                            baseY: (Math.random() - 0.5) * radius * 1.6,
                            size: Math.random() * 22 + 6,
                            color: palette[Math.floor(Math.random() * palette.length)],
                            type: Math.floor(Math.random() * 4),
                            rotOffset: Math.random() * Math.PI * 2,
                            speed: 0.015 + Math.random() * 0.025, // más rápido
                            phaseX: Math.random() * 100,
                            phaseY: Math.random() * 100,
                            ampX: 30 + Math.random() * 40, // mayor amplitud
                            ampY: 30 + Math.random() * 40,
                            sizeSpeed: 0.02 + Math.random() * 0.04,
                        });
                    }
                    centers.push({
                        cx, cy,
                        radius: radius * 0.9,
                        angle: Math.random() * Math.PI * 2,
                        speed: 0.006 + Math.random() * 0.01, // velocidad de rotación del ventilador (ligeramente variable)
                        shapes: shapes,
                        slices: 8 + Math.floor(Math.random() * 4) // entre 8 y 11 sectores
                    });
                }
            }
        }

        initCenters();

        // Reajustar centros al cambiar tamaño
        window.addEventListener('resize', () => {
            resizeCanvas();
            initCenters();
        });

        function drawKaleidoscope() {
            // Fondo con degradado oscuro sin negro
            const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H)*0.7);
            grad.addColorStop(0, '#2a1a4a');
            grad.addColorStop(1, '#0d0d2b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Dibujar cada centro
            centers.forEach(center => {
                const { cx, cy, radius, angle, speed, shapes, slices } = center;
                const sliceAngle = (Math.PI * 2) / slices;

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle);

                for (let i = 0; i < slices; i++) {
                    ctx.save();
                    ctx.rotate(i * sliceAngle + sliceAngle / 2);

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, radius, -sliceAngle / 2, sliceAngle / 2);
                    ctx.closePath();
                    ctx.clip();

                    if (i % 2 === 1) ctx.scale(-1, 1);

                    shapes.forEach(s => {
                        // Movimiento caótico rápido: múltiples ondas
                        const t = angle * s.speed * 3 + s.rotOffset;
                        const offsetX = Math.sin(t * 2.1 + s.phaseX) * s.ampX +
                                        Math.cos(t * 1.3 + s.phaseY) * s.ampX * 0.4;
                        const offsetY = Math.cos(t * 1.7 + s.phaseY) * s.ampY +
                                        Math.sin(t * 1.1 + s.phaseX) * s.ampY * 0.4;
                        const x = s.baseX + offsetX;
                        const y = s.baseY + offsetY;

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(t * 1.2);

                        ctx.fillStyle = s.color;
                        ctx.shadowColor = s.color;
                        ctx.shadowBlur = 10;

                        const sz = s.size * (0.7 + 0.6 * Math.sin(t * s.sizeSpeed + s.rotOffset));

                        ctx.beginPath();
                        if (s.type === 0) { // círculo
                            ctx.arc(0, 0, sz, 0, Math.PI * 2);
                            ctx.fill();
                        } else if (s.type === 1) { // cuadrado
                            ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
                        } else if (s.type === 2) { // triángulo
                            ctx.moveTo(0, -sz);
                            ctx.lineTo(sz, sz);
                            ctx.lineTo(-sz, sz);
                            ctx.closePath();
                            ctx.fill();
                        } else { // estrella 4 puntas
                            for (let j = 0; j < 8; j++) {
                                const r = j % 2 === 0 ? sz : sz * 0.4;
                                const a = (j / 8) * Math.PI * 2 - Math.PI / 2;
                                if (j === 0) ctx.moveTo(r * Math.cos(a), r * Math.sin(a));
                                else ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                            }
                            ctx.closePath();
                            ctx.fill();
                        }

                        ctx.shadowBlur = 0;
                        ctx.restore();
                    });

                    ctx.restore();
                }

                ctx.restore();

                // Actualizar ángulo de este centro (velocidad de ventilador)
                center.angle += speed;
            });

            requestAnimationFrame(drawKaleidoscope);
        }

        drawKaleidoscope();

        // =============================================
        // 2. LÓGICA DEL GATO (sin cambios)
        // =============================================
        const catContainer = document.getElementById('cat-container');
        let catTimeout = null;
        let hideTimeout = null;
        let attempts = 0;
        const MAX_ATTEMPTS = 5;
        const VISIBLE_TIME = 7000;

        function getRandomPosition() {
            const size = 32;
            const left = Math.random() * (window.innerWidth - size);
            const top = Math.random() * (window.innerHeight - size);
            return { left, top };
        }

        function showCat() {
            const pos = getRandomPosition();
            catContainer.style.left = pos.left + 'px';
            catContainer.style.top = pos.top + 'px';
            catContainer.style.display = 'block';

            catContainer.classList.remove('cat-pop', 'cat-hide');
            void catContainer.offsetWidth;
            catContainer.classList.add('cat-pop');

            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                hideCat();
            }, VISIBLE_TIME);
        }

        function hideCat() {
            catContainer.classList.remove('cat-pop');
            catContainer.classList.add('cat-hide');
            setTimeout(() => {
                catContainer.style.display = 'none';
                scheduleCat();
            }, 600);
        }

        function scheduleCat() {
            clearTimeout(catTimeout);
            const delay = Math.random() * 7000 + 2000;

            catTimeout = setTimeout(() => {
                attempts++;
                if (Math.random() < 0.18 || attempts >= MAX_ATTEMPTS) {
                    attempts = 0;
                    showCat();
                } else {
                    scheduleCat();
                }
            }, delay);
        }

        catContainer.addEventListener('click', function(e) {
            e.stopPropagation();
            window.location.href = 'views/ARG/688715.html';
        });

        scheduleCat();

        window.addEventListener('resize', function() {
            if (catContainer.style.display !== 'none' && !catContainer.classList.contains('cat-hide')) {
                const pos = getRandomPosition();
                catContainer.style.left = pos.left + 'px';
                catContainer.style.top = pos.top + 'px';
            }
        });

        console.log('🐱 DOOR2: gato amarillo camuflado en un caos de colores, ¡encuéntralo!');
    </script>
</body>
</html>
