<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controles Móvil + Tecla Z</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: sans-serif;
            touch-action: pan-y; /* Evita zoom al tocar botones */
        }
        .game-container {
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* El cuadrado que se mueve */
        #player {
            width: 50px;
            height: 50px;
            background: #e94560;
            border-radius: 10px;
            position: relative;
            left: 0;
            top: 0;
            transition: left 0.1s, top 0.1s; /* Suavizado */
            box-shadow: 0 0 20px #e9456080;
        }
        #game-board {
            width: 300px;
            height: 300px;
            background: #0f3460;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            touch-action: none; /* Para que el canvas no interfiera */
        }
        /* Controles táctiles */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
            margin: 0 auto;
        }
        .ctrl-btn {
            background: #533483;
            border: none;
            border-radius: 16px;
            padding: 18px 0;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #2d1b4e;
            touch-action: manipulation; /* Mejora respuesta táctil */
        }
        .ctrl-btn:active {
            transform: scale(0.92);
            box-shadow: 0 2px 0 #2d1b4e;
        }
        .ctrl-btn.action {
            background: #e94560;
            box-shadow: 0 4px 0 #a03248;
            font-size: 1.8rem;
        }
        .empty { visibility: hidden; } /* Celda vacía para mantener grid */

        /* Indicador de tecla Z */
        .info {
            color: #aaa;
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .info kbd {
            background: #222;
            padding: 4px 12px;
            border-radius: 8px;
            color: #e94560;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="game-board">
        <div id="player"></div>
    </div>

    <!-- Botones táctiles -->
    <div class="controls">
        <div class="empty"></div> <!-- Arriba -->
        <button class="ctrl-btn" id="btn-up">⬆</button>
        <div class="empty"></div>

        <button class="ctrl-btn" id="btn-left">⬅</button>
        <button class="ctrl-btn action" id="btn-action">⚡ Z</button>
        <button class="ctrl-btn" id="btn-right">➡</button>

        <div class="empty"></div>
        <button class="ctrl-btn" id="btn-down">⬇</button>
        <div class="empty"></div>
    </div>

    <div class="info">
        En PC presiona <kbd>Z</kbd> para acción
    </div>
</div>

<script>
    (function() {
        const player = document.getElementById('player');
        const board = document.getElementById('game-board');
        const BOARD_SIZE = 300;
        const STEP = 20; // Píxeles por pulsación

        // Estado
        let x = 0, y = 0;

        // Límites
        function clamp(value, max) {
            return Math.max(0, Math.min(max, value));
        }

        function movePlayer(dx, dy) {
            x = clamp(x + dx, BOARD_SIZE - 50);
            y = clamp(y + dy, BOARD_SIZE - 50);
            player.style.left = x + 'px';
            player.style.top = y + 'px';
        }

        // --- ACCIÓN (tecla Z o botón táctil) ---
        function doAction() {
            // Ejemplo: cambia de color y da un "salto" visual
            player.style.transition = 'all 0.15s';
            player.style.transform = 'scale(1.4)';
            player.style.background = '#f5c842';
            player.style.boxShadow = '0 0 40px #f5c842';

            setTimeout(() => {
                player.style.transform = 'scale(1)';
                player.style.background = '#e94560';
                player.style.boxShadow = '0 0 20px #e9456080';
                // Restauramos transición suave para movimiento
                setTimeout(() => {
                    player.style.transition = 'left 0.1s, top 0.1s';
                }, 50);
            }, 200);
        }

        // --- EVENTOS TÁCTILES (con soporte para clics y toques largos) ---
        function setupButton(id, dx, dy) {
            const btn = document.getElementById(id);
            if (!btn) return;

            // Prevenir comportamiento por defecto (scroll, zoom)
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (id === 'btn-action') {
                    doAction();
                } else {
                    movePlayer(dx, dy);
                }
            }, { passive: false });

            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (id === 'btn-action') {
                    doAction();
                } else {
                    movePlayer(dx, dy);
                }
            });
        }

        setupButton('btn-up', 0, -STEP);
        setupButton('btn-down', 0, STEP);
        setupButton('btn-left', -STEP, 0);
        setupButton('btn-right', STEP, 0);
        setupButton('btn-action', 0, 0); // No mueve, solo acción

        // --- TECLA Z (acción) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'z' || e.key === 'Z') {
                e.preventDefault(); // Evita que la Z escriba en inputs
                doAction();
            }
        });

        // También las flechas del teclado (opcional, para PC)
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            // Evita scroll con flechas
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
            }
            switch(key) {
                case 'ArrowUp': movePlayer(0, -STEP); break;
                case 'ArrowDown': movePlayer(0, STEP); break;
                case 'ArrowLeft': movePlayer(-STEP, 0); break;
                case 'ArrowRight': movePlayer(STEP, 0); break;
            }
        });

        // Posición inicial
        movePlayer(0, 0);
        console.log('Controles listos. Pulsa Z o botón ⚡');
    })();
</script>
</body>
</html>
