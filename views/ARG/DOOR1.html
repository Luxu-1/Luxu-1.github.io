<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zelda - Aventura</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background:#1a1a1a;
      display:flex; justify-content:center; align-items:center;
      height:100vh; overflow:hidden;
      font-family:'Courier New',monospace;
    }
    .game-container {
      position:relative;
      background:#2a2a2a;
      border:3px solid #444;
      border-radius:8px;
      padding:10px;
      box-shadow:0 0 30px rgba(0,0,0,0.8);
    }
    canvas {
      display:block;
      width:500px;
      height:500px;
      image-rendering:pixelated; /* para CSS */
      image-rendering:crisp-edges; /* para Firefox */
      background:#3a3a3a;
      cursor:none;
    }
    .controls-info {
      color:rgba(255,255,255,0.2);
      text-align:center;
      font-size:14px;
      padding:8px 0;
      letter-spacing:1px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="500" height="500"></canvas>
  <div class="controls-info">WASD / Flechas para mover</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false; // 🔥 EVITA SUAVIZADO

    // ==================== CONFIGURACIÓN DEL SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png';

    // Tamaño original de cada sprite en el sheet (en píxeles)
    const SPRITE_W = 22;
    const SPRITE_H = 28;

    // Escalamos el personaje para que sea más grande (ajusta este factor)
    const SCALE = 2.18; // 22*2.18 ≈ 48, 28*2.18 ≈ 61 → redondeamos a 48x60
    const CHAR_W = Math.round(SPRITE_W * SCALE); // 48
    const CHAR_H = Math.round(SPRITE_H * SCALE); // 61 (lo dejamos así o redondeamos a 60)

    // Índices de sprite (columna, fila) – AJUSTA SEGÚN TU SPRITE SHEET
    // Por defecto asumo que están en la fila 0, columnas 0-5
    const IDX_IDLE = { col:0, row:0 };
    const IDX_WALK1 = { col:1, row:0 };
    const IDX_WALK2 = { col:2, row:0 };
    const IDX_SIDE_WALK1 = { col:4, row:0 }; // <-- si tu perfil caminando está en columna 4
    const IDX_SIDE_WALK2 = { col:5, row:0 }; // <-- si tienes un segundo perfil caminando

    // ==================== ESTADO DEL JUGADOR ====================
    const player = {
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      speed: 1.5,
      dir: 'down',
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 8,
      spriteCol: 0,
      spriteRow: 0,
      flipX: false,
    };

    // ==================== TECLAS ====================
    const keys = { up:false, down:false, left:false, right:false };

    // ==================== CARGA DE SPRITE SHEET ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;

    spriteSheet.onload = () => {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado');
    };
    spriteSheet.onerror = () => {
      console.error('❌ Error al cargar el sprite sheet. Verifica la ruta:', SPRITE_SHEET_URL);
      ctx.fillStyle = 'red';
      ctx.font = '16px monospace';
      ctx.fillText('Error: no se encontró el sprite sheet', 150, 250);
    };

    // ==================== ACTUALIZACIÓN ====================
    function update() {
      let dx=0, dy=0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx!==0 && dy!==0) { dx*=0.7071; dy*=0.7071; }

      const moving = (dx!==0 || dy!==0);
      player.moving = moving;

      if (moving) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';
      }

      // Seleccionar sprite
      if (!moving) {
        // IDLE
        player.spriteCol = IDX_IDLE.col;
        player.spriteRow = IDX_IDLE.row;
        player.flipX = false;
        player.frame = 0;
      } else {
        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame;
        }

        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = (player.frame === 0) ? IDX_WALK1.col : IDX_WALK2.col;
          player.spriteRow = IDX_WALK1.row;
          player.flipX = false;
        } else if (dir === 'right') {
          player.spriteCol = (player.frame === 0) ? IDX_SIDE_WALK1.col : IDX_SIDE_WALK2.col;
          player.spriteRow = IDX_SIDE_WALK1.row;
          player.flipX = false;
        } else if (dir === 'left') {
          player.spriteCol = (player.frame === 0) ? IDX_SIDE_WALK1.col : IDX_SIDE_WALK2.col;
          player.spriteRow = IDX_SIDE_WALK1.row;
          player.flipX = true;
        }
      }
    }

    // ==================== DIBUJADO ====================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Fondo
      ctx.fillStyle = '#2e5a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#3a6b4a';
      for (let i=0; i<canvas.width; i+=60) {
        for (let j=0; j<canvas.height; j+=60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      if (sheetLoaded) {
        const sx = player.spriteCol * SPRITE_W;
        const sy = player.spriteRow * SPRITE_H;

        ctx.imageSmoothingEnabled = false; // reafirmar

        if (player.flipX) {
          // Dibujar con ancho negativo (flip horizontal)
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x + player.width, player.y,
            -player.width, player.height
          );
        } else {
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x, player.y,
            player.width, player.height
          );
        }
      } else {
        // Fallback
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = 'white';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }
    }

    // ==================== BUCLE ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = true;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = true;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = true;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = true;
    }
    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = false;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = false;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = false;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = false;
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== INICIO ====================
    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado desde caché');
    }
    gameLoop();
    console.log('🎮 Juego iniciado. Tamaño aumentado, sin suavizado.');
  })();
</script>
</body>
</html>
