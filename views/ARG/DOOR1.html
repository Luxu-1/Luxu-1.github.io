<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby King</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      position: relative;
      background-color: #2a2a2a;
      border: 3px solid #444;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    canvas {
      display: block;
      width: 500px;
      height: 500px;
      background-color: #3a3a3a;
      image-rendering: pixelated;
      cursor: none;
    }
    .controls-info {
      color: rgba(255,255,255,0.2);
      text-align: center;
      font-size: 14px;
      padding: 8px 0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="500" height="500"></canvas>
  <div class="controls-info">WASD / Flechas para mover</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ==================== CONFIGURACIÓN DEL SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png'; // <-- CAMBIA ESTA RUTA POR TU SPRITE SHEET
    const ORIGINAL_WIDTH = 22;
    const ORIGINAL_HEIGHT = 28;
    // Escalamos el personaje para que sea más grande (factor ~1.45 para que ancho sea 32)
    const SCALE = 32 / ORIGINAL_WIDTH; // ≈1.45
    const SPRITE_WIDTH = Math.round(ORIGINAL_WIDTH * SCALE); // 32
    const SPRITE_HEIGHT = Math.round(ORIGINAL_HEIGHT * SCALE); // 40

    const SHEET_COLS = 6; // columnas totales
    // Índices de columna (0-based)
    const IDLE = 0;
    const WALK1 = 1;
    const WALK2 = 2;
    const SIDE_IDLE = 3;
    const SIDE_WALK1 = 4;
    const SIDE_WALK2 = 5;

    // ==================== ESTADO DEL JUGADOR ====================
    const player = {
      x: 250 - SPRITE_WIDTH/2,
      y: 250 - SPRITE_HEIGHT/2,
      width: SPRITE_WIDTH,
      height: SPRITE_HEIGHT,
      speed: 1.5, // <-- velocidad reducida
      dir: 'down',
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 8,
      spriteCol: IDLE,
      flipX: false,
    };

    // ==================== TECLAS ====================
    const keys = { up: false, down: false, left: false, right: false };

    // ==================== CARGA DE SPRITE SHEET ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;

    spriteSheet.onload = () => {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado');
    };
    spriteSheet.onerror = () => {
      console.error('❌ Error al cargar el sprite sheet. Verifica la ruta:', SPRITE_SHEET_URL);
      ctx.fillStyle = 'red';
      ctx.font = '16px monospace';
      ctx.fillText('Error: no se encontró el sprite sheet', 150, 250);
    };

    // ==================== ACTUALIZACIÓN ====================
    function update() {
      let dx = 0, dy = 0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx !== 0 && dy !== 0) {
        dx *= 0.7071;
        dy *= 0.7071;
      }

      const moving = (dx !== 0 || dy !== 0);
      player.moving = moving;

      if (moving) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';
      }

      // Seleccionar sprite
      if (!moving) {
        player.spriteCol = IDLE;
        player.flipX = false;
        player.frame = 0;
      } else {
        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame;
        }

        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = (player.frame === 0) ? WALK1 : WALK2;
          player.flipX = false;
        } else if (dir === 'right') {
          player.spriteCol = (player.frame === 0) ? SIDE_WALK1 : SIDE_WALK2;
          player.flipX = false;
        } else if (dir === 'left') {
          player.spriteCol = (player.frame === 0) ? SIDE_WALK1 : SIDE_WALK2;
          player.flipX = true;
        }
      }
    }

    // ==================== DIBUJADO (con flip mejorado) ====================
    function draw() {
      // Fondo
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#2e5a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Decoración simple
      ctx.fillStyle = '#3a6b4a';
      for (let i = 0; i < canvas.width; i += 60) {
        for (let j = 0; j < canvas.height; j += 60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      // Dibujar jugador
      if (sheetLoaded) {
        const col = player.spriteCol;
        const row = 0;
        const sx = col * ORIGINAL_WIDTH;
        const sy = row * ORIGINAL_HEIGHT;

        // Usar método de dibujo con ancho negativo para flip
        if (player.flipX) {
          // Dibujar con ancho negativo: el origen se desplaza a la derecha
          ctx.drawImage(
            spriteSheet,
            sx, sy, ORIGINAL_WIDTH, ORIGINAL_HEIGHT,
            player.x + player.width, player.y,
            -player.width, player.height
          );
        } else {
          ctx.drawImage(
            spriteSheet,
            sx, sy, ORIGINAL_WIDTH, ORIGINAL_HEIGHT,
            player.x, player.y,
            player.width, player.height
          );
        }
      } else {
        // Fallback
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = 'white';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }
    }

    // ==================== BUCLE PRINCIPAL ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
        e.preventDefault();
      }
      if (key === 'w' || key === 'W' || key === 'ArrowUp') keys.up = true;
      if (key === 's' || key === 'S' || key === 'ArrowDown') keys.down = true;
      if (key === 'a' || key === 'A' || key === 'ArrowLeft') keys.left = true;
      if (key === 'd' || key === 'D' || key === 'ArrowRight') keys.right = true;
    }

    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
        e.preventDefault();
      }
      if (key === 'w' || key === 'W' || key === 'ArrowUp') keys.up = false;
      if (key === 's' || key === 'S' || key === 'ArrowDown') keys.down = false;
      if (key === 'a' || key === 'A' || key === 'ArrowLeft') keys.left = false;
      if (key === 'd' || key === 'D' || key === 'ArrowRight') keys.right = false;
    }

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== INICIO ====================
    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado desde caché');
    }
    gameLoop();

    console.log('🎮 Juego iniciado. Velocidad reducida, personaje más grande.');
  })();
</script>
</body>
</html>
