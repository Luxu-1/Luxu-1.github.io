<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Word has reached us...</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* ========== ESTILOS ========== */
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { background:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; font-family:'Courier New',monospace; touch-action: none; }
    .game-wrapper { display:flex; flex-direction:column; align-items:center; gap:12px; padding:10px; }
    .game-container { position:relative; background:#2a2a2a; border:3px solid #444; border-radius:8px; padding:10px; box-shadow:0 0 30px rgba(0,0,0,0.8); touch-action: none; }
    canvas { display:block; width:500px; height:500px; image-rendering:pixelated; image-rendering:crisp-edges; background:#353535; cursor:none; touch-action: none; }
    .crt-overlay { position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); height: calc(100% - 20px); pointer-events: none; z-index: 10; border-radius: 4px; overflow: hidden; }
    .crt-overlay::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px); pointer-events: none; z-index: 11; }
    .crt-overlay::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%); pointer-events: none; z-index: 12; }
    @keyframes flicker { 0% { opacity: 0.97; } 50% { opacity: 1; } 100% { opacity: 0.97; } }
    .crt-overlay { animation: flicker 0.15s infinite alternate; }

    /* ===== INFO-BAR OCULTA ===== */
    .info-bar { display: none; }

    .controls-info { color:rgba(255,255,255,0.2); text-align:center; font-size:14px; padding:4px 0; letter-spacing:1px; }
    .touch-controls { display: none; width:100%; max-width:500px; justify-content:space-between; align-items:center; gap:20px; touch-action: none; padding:0 10px; }
    .dpad { position:relative; width:160px; height:160px; touch-action:none; }
    .dpad-btn { position:absolute; width:50px; height:50px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); border-radius:10px; color:rgba(255,255,255,0.7); font-size:28px; display:flex; justify-content:center; align-items:center; touch-action:none; cursor:pointer; transition:background 0.1s; -webkit-tap-highlight-color:transparent; }
    .dpad-btn:active { background:rgba(255,255,255,0.35); border-color:rgba(255,255,255,0.6); }
    .dpad-up    { top:0; left:55px; }
    .dpad-down  { bottom:0; left:55px; }
    .dpad-left  { top:55px; left:0; }
    .dpad-right { top:55px; right:0; }
    .action-btn { width:80px; height:80px; background:rgba(255,255,255,0.2); border:3px solid rgba(255,255,255,0.5); border-radius:50%; color:rgba(255,255,255,0.8); font-size:18px; font-family:'Courier New',monospace; font-weight:bold; display:flex; justify-content:center; align-items:center; touch-action:none; cursor:pointer; transition:all 0.1s; -webkit-tap-highlight-color:transparent; }
    .action-btn:active { background:rgba(255,200,50,0.4); border-color:rgba(255,200,50,0.8); transform:scale(0.92); }
    @media (pointer: coarse) { .touch-controls { display:flex; } .controls-info .pc-only { display:none; } .controls-info .mobile-only { display:inline-block; } }
    @media (pointer: fine) { .controls-info .pc-only { display:inline-block; } .controls-info .mobile-only { display:none; } }
    @media (max-width:560px) { canvas { width:90vw; height:90vw; max-width:500px; max-height:500px; } .game-container { padding:6px; } .crt-overlay { top:6px; left:6px; width:calc(100% - 12px); height:calc(100% - 12px); } .dpad { width:130px; height:130px; } .dpad-btn { width:40px; height:40px; font-size:22px; } .dpad-up    { top:0; left:45px; } .dpad-down  { bottom:0; left:45px; } .dpad-left  { top:45px; left:0; } .dpad-right { top:45px; right:0; } .action-btn { width:65px; height:65px; font-size:15px; } }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="crt-overlay"></div>
  </div>

  <!-- INFO-BAR OCULTA -->
  <div class="info-bar">
    <span>⬆ <span id="upCounter" class="highlight">0</span></span>
    <span>⬇ <span id="downCounter" class="highlight">0</span></span>
    <span>⬅ <span id="leftCounter" class="highlight">0</span></span>
    <span>➡ <span id="rightCounter" class="highlight">0</span></span>
    <span>🚶 <span id="totalSteps" class="highlight">0</span></span>
  </div>

  <div class="controls-info">
    <span class="pc-only">WASD / Flechas · Z = correr (mantener) / hablar (quieto)</span>
    <span class="mobile-only">Botones táctiles</span>
  </div>

  <div class="touch-controls" id="touchControls">
    <div class="dpad" id="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <button class="action-btn" id="actionBtn">♕</button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ==================== RUTAS ====================
    const ROUTES = {
      clone: 'https://luxu-1.github.io/views/hat',
      babyKing: 'https://luxu-1.github.io/views/ARG/806392.html'
    };

    // ==================== SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png';
    const SPRITE_W = 22;
    const SPRITE_H = 28;
    const SCALE = 4.3;
    const CHAR_W = Math.round(SPRITE_W * SCALE);
    const CHAR_H = Math.round(SPRITE_H * SCALE);
    const KING_SCALE = 14;
    const COLLISION_SHRINK = 0.16;
    const COLLISION_Y_OFFSET = 0;
    const INTERACT_DIST = 100;

    const SPRITES = {
      IDLE:      { col:0, row:0 },
      WALK1:     { col:1, row:0 },
      WALK2:     { col:2, row:0 },
      SIDE_IDLE: { col:3, row:0 },
      SIDE_WALK: { col:4, row:0 },
      ANGEL:     { col:0, row:1 },
      ARBOL:     { col:1, row:1 },
      PASTO:     { col:2, row:1 },
      FLOR:      { col:3, row:1 },
      CARTEL1:   { col:0, row:2 },
      CARTEL2:   { col:1, row:2 },
      CARTEL3:   { col:2, row:2 },
      BABY_KING: { col:0, row:3 },
      KING:      { col:1, row:3 },
    };

    const SPRITE_LOOKUP = {};
    for (const name in SPRITES) {
      const s = SPRITES[name];
      SPRITE_LOOKUP[`${s.col},${s.row}`] = name;
    }

    // ==================== JUGADOR ====================
    const BASE_SPEED = 1.5;
    const player = {
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      speed: BASE_SPEED,
      dir: 'down',
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 10,
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
    };
    window.player = player;

    // ==================== CLON ====================
    const clone = {
      active: false,
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
      talked: false,
      cooldown: 0,
    };

    // ==================== BABY KING ====================
    const babyKing = {
      active: false,
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      spriteCol: SPRITES.BABY_KING.col,
      spriteRow: SPRITES.BABY_KING.row,
      flipX: false,
      talked: false,
      cooldown: 0,
    };

    // ==================== DIÁLOGO ====================
    const dialog = {
      active: false,
      text: '',
      displayText: '',
      charIndex: 0,
      charTimer: 0,
      charDelay: 5,
      speed: 'slow',
      speaker: null,
      complete: false,
      lines: null,
      lineIndex: 0,
    };

    let dialogCooldown = 0;

    // ==================== CONTADORES ====================
    const counters = {
      up: 0, down: 0, left: 0, right: 0, total: 0,
      consecutiveUp: 0,
      consecutiveDown: 0,
      lastDir: null,
      stepsSinceSpawn: 0,
    };

    // ==================== TECLAS ====================
    const keys = { up:false, down:false, left:false, right:false, action:false };

    // ==================== UI ====================
    const upCounterEl = document.getElementById('upCounter');
    const downCounterEl = document.getElementById('downCounter');
    const leftCounterEl = document.getElementById('leftCounter');
    const rightCounterEl = document.getElementById('rightCounter');
    const totalStepsEl = document.getElementById('totalSteps');

    function updateUI() {
      try {
        if (upCounterEl) upCounterEl.textContent = counters.up;
        if (downCounterEl) downCounterEl.textContent = counters.down;
        if (leftCounterEl) leftCounterEl.textContent = counters.left;
        if (rightCounterEl) rightCounterEl.textContent = counters.right;
        if (totalStepsEl) totalStepsEl.textContent = counters.total;
      } catch (e) {}
    }

    // ==================== CARGA DE SPRITE ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;
    spriteSheet.onload = () => { sheetLoaded = true; console.log('✅ Sprite sheet cargado'); };
    spriteSheet.onerror = () => { console.error('❌ Error al cargar el sprite sheet.'); };

    // ==================== AUDIOS ====================
    const shadowAudio = new Audio('/media/sound/shadow.mp3');
    const colorAudio = new Audio('/media/sound/color.mp3');
    const bgMusic = new Audio('/media/sound/listenthenews.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.6;
    let bgMusicStoppedForever = false;

    function tryPlayBgMusic() {
      bgMusic.play().catch(() => {
        const resume = () => {
          bgMusic.play().catch(() => {});
          window.removeEventListener('keydown', resume);
          window.removeEventListener('pointerdown', resume);
        };
        window.addEventListener('keydown', resume, { once: true });
        window.addEventListener('pointerdown', resume, { once: true });
      });
    }

    function syncBackgroundMusic() {
      if (bgMusicStoppedForever) {
        if (!bgMusic.paused) bgMusic.pause();
        return;
      }
      const shouldPause = dialog.active && (dialog.speaker === 'clone' || dialog.speaker === 'babyKing');
      if (shouldPause) {
        if (!bgMusic.paused) bgMusic.pause();
      } else if (!document.hidden) {
        if (bgMusic.paused) bgMusic.play().catch(() => {});
      }
    }

    function playOnce(audio) {
      try {
        audio.pause();
        audio.currentTime = 0;
        audio.play().catch(e => console.warn(e));
      } catch (e) { console.warn(e); }
    }

    // ==================== SONIDO TICK (MEJORADO PARA EL ÁNGEL) ====================
    let audioCtx = null;

    function isAngel(speaker) {
      return speaker && typeof speaker === 'object' && speaker.col === 0 && speaker.row === 1;
    }

    function playTickSound(lowPitch = false, char = '', speaker = null) {
      if (char === ' ') return;
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const isAngelSpeaker = isAngel(speaker);
        if (isAngelSpeaker) {
          // Sonido angelical: onda senoidal suave, frecuencia aguda y volumen bajo
          osc.type = 'sine';
          osc.frequency.value = 1200 + Math.random() * 100;
          gain.gain.value = 0.025;
          osc.start();
          osc.stop(audioCtx.currentTime + 0.05);
        } else {
          // Sonido normal (cuadrado)
          osc.type = 'square';
          if (lowPitch) {
            osc.frequency.value = 50 + Math.random() * 200;
            gain.gain.value = 0.09;
          } else {
            osc.frequency.value = 800 + Math.random() * 200;
            gain.gain.value = 0.03;
          }
          osc.start();
          osc.stop(audioCtx.currentTime + 0.03);
        }
      } catch (e) {}
    }

    // ==================== DIÁLOGO ====================
    function startDialog(textOrLines, speaker, speed = 'slow') {
      if (dialog.active || dialogCooldown > 0) return;
      const isMultiLine = Array.isArray(textOrLines);
      dialog.active = true;
      dialog.lines = isMultiLine ? textOrLines : null;
      dialog.lineIndex = 0;
      dialog.text = isMultiLine ? textOrLines[0] : textOrLines;
      dialog.displayText = '';
      dialog.charIndex = 0;
      dialog.charTimer = 0;
      dialog.speed = speed;
      dialog.speaker = speaker;
      dialog.complete = false;
      dialog.charDelay = (speed === 'slow') ? 16 : 2.4;
      console.log(`💬 Inicio diálogo: "${dialog.text}" (${speed})`);
    }

    function advanceDialogLine() {
      dialog.lineIndex++;
      dialog.text = dialog.lines[dialog.lineIndex];
      dialog.displayText = '';
      dialog.charIndex = 0;
      dialog.charTimer = 0;
      dialog.complete = false;
      console.log(`💬 Siguiente línea: "${dialog.text}"`);
    }

    function updateDialog() {
      if (!dialog.active || dialog.complete) return;
      dialog.charTimer++;
      if (dialog.charTimer >= dialog.charDelay) {
        dialog.charTimer = 0;
        if (dialog.charIndex < dialog.text.length) {
          const currentChar = dialog.text[dialog.charIndex];
          dialog.displayText += currentChar;
          dialog.charIndex++;
          const isSlow = (dialog.speaker === 'clone' || dialog.speaker === 'babyKing');
          // Pasamos el speaker para que el ángel tenga su sonido especial
          playTickSound(isSlow, currentChar, dialog.speaker);
        } else {
          dialog.complete = true;
        }
      }
    }

    // ==================== DIBUJO DE DIÁLOGO ====================
    function drawDialog() {
      if (!dialog.active) return;
      const dw = canvas.width * 0.85, dh = 100;
      const x = (canvas.width - dw) / 2, y = canvas.height - dh - 20;
      ctx.fillStyle = 'black';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 20;
      ctx.fillRect(x, y, dw, dh);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 4;
      ctx.strokeRect(x, y, dw, dh);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 16px "Press Start 2P", "Courier New", monospace';
      ctx.textBaseline = 'top';
      ctx.imageSmoothingEnabled = false;
      const margin = 15;
      const maxWidth = dw - margin * 2;
      let lines = [], currentLine = '';
      const words = dialog.displayText.split(' ');
      for (let word of words) {
        let testLine = currentLine + (currentLine ? ' ' : '') + word;
        if (ctx.measureText(testLine).width > maxWidth) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) lines.push(currentLine);
      const lineHeight = 28;
      for (let i = 0; i < Math.min(lines.length, 3); i++) {
        ctx.fillText(lines[i], x + margin, y + margin + i * lineHeight);
      }
      if (dialog.complete) {
        const blink = Math.floor(Date.now() / 500) % 2 === 0;
        if (blink) {
          ctx.fillStyle = 'white';
          ctx.font = '18px "Press Start 2P", monospace';
          ctx.fillText('▼', x + dw - 35, y + dh - 28);
        }
      }
    }

    // ==================== MUNDO ====================
    const worldObjects = [];

    function addObject(col, row, x, y, collision = true, dialogText = null) {
      const spriteName = SPRITE_LOOKUP[`${col},${row}`];
      if (!spriteName) {
        console.warn(`Sprite no encontrado para col:${col} row:${row}`);
        return;
      }
      worldObjects.push({
        col, row,
        x: x,
        y: y,
        width: CHAR_W,
        height: CHAR_H,
        spriteCol: col,
        spriteRow: row,
        collision: collision,
        dialog: dialogText,
      });
    }

    // Ángel y carteles
    addObject(0, 1, 204, 20, true, [
      "* Emperor, do you hear the news? A new king has been born.",
      "* They say he was prophesied, different from others.",
      "* Time makes everything change."
    ]);
    addObject(0, 2, 31, 210, true, [
      "* I told you, a King would be born, a different one, Tyahaha!",
      "-P"
      ]);
    addObject(1, 2, 204, 357, true, [
      "* The one who seeks to loom high.",
      "-P"
      ]);
    addObject(2, 2, 380, 210, true, [
      "* Small, naive, still innocent.",
      "-P"
      ]);
    // Vegetación
    addObject(1, 1, 30, 20, true, null);
    addObject(1, 1, 380, 20, true, null);
    addObject(2, 1, 150, 30, false, null);
    addObject(3, 1, 31, 357, false, null);
    addObject(3, 1, 380, 357, false, null);

    // ==================== COLISIONES ====================
    function rectCollide(r1, r2) {
      return r1.x < r2.x + r2.width &&
             r1.x + r1.width > r2.x &&
             r1.y < r2.y + r2.height &&
             r1.y + r1.height > r2.y;
    }

    function getCollisionBox(entity) {
      const shrink = COLLISION_SHRINK;
      return {
        x: entity.x + (1 - shrink) * entity.width / 2,
        y: entity.y + (1 - shrink) * entity.height / 2 + COLLISION_Y_OFFSET,
        width: entity.width * shrink,
        height: entity.height * shrink
      };
    }

    function isCollidingWithWorld(rect) {
      for (let obj of worldObjects) {
        if (!obj.collision) continue;
        if (rectCollide(rect, getCollisionBox(obj))) return true;
      }
      if (clone.active && rectCollide(rect, getCollisionBox(clone))) return true;
      if (babyKing.active && rectCollide(rect, getCollisionBox(babyKing))) return true;
      return false;
    }

    // ==================== SECUENCIAS ====================
    let eventSequence = null;
    let sequenceTimer = 0;
    let sequenceStep = 0;

    function startCloneSequence() {
      eventSequence = 'clone';
      sequenceStep = 0;
      sequenceTimer = 0;
      console.log('🔮 Iniciando secuencia del Clon');
    }

    function startBabyKingSequence() {
      eventSequence = 'babyKing';
      sequenceStep = 0;
      sequenceTimer = 0;
      console.log('👑 Iniciando secuencia de Baby King');
    }

    function updateSequence() {
      if (!eventSequence) return;
      sequenceTimer++;
      const seconds = sequenceTimer / 60;

      if (eventSequence === 'clone') {
        if (sequenceStep === 0) {
          playOnce(shadowAudio);
          sequenceStep = 1;
          sequenceTimer = 0;
        } else if (sequenceStep === 1 && seconds >= 2.5) {
          window.location.href = ROUTES.clone;
          return;
        }
      } else if (eventSequence === 'babyKing') {
        const colorDurations = [0.5, 0.8, 0.8, 0.8, 0.8];
        if (sequenceStep === 0) {
          playOnce(colorAudio);
          sequenceStep = 1;
          sequenceTimer = 0;
        } else if (sequenceStep >= 1 && sequenceStep <= 4) {
          if (seconds >= colorDurations[sequenceStep - 1]) {
            sequenceStep++;
            sequenceTimer = 0;
          }
        } else if (sequenceStep === 5) {
          window.location.href = ROUTES.babyKing;
          return;
        }
      }
    }

    function getSequenceColor() {
      if (eventSequence === 'babyKing') {
        if (sequenceStep === 1) return '#FFFF00';
        if (sequenceStep === 2) return '#0000FF';
        if (sequenceStep === 3) return '#00FFFF';
        if (sequenceStep === 4) return '#00FF00';
      }
      return null;
    }

    // ==================== CONTADOR DE PASOS ====================
    function recordStep(dir) {
      if (dir === 'up') counters.up++;
      else if (dir === 'down') counters.down++;
      else if (dir === 'left') counters.left++;
      else if (dir === 'right') counters.right++;
      counters.total++;
      handleConsecutive(dir);
      updateUI();
    }

    function despawnCharacters() {
      if (clone.active) {
        clone.active = false;
        clone.talked = false;
        clone.cooldown = 0;
      }
      if (babyKing.active) {
        babyKing.active = false;
        babyKing.talked = false;
        babyKing.cooldown = 0;
      }
      counters.stepsSinceSpawn = 0;
    }

    function handleConsecutive(dir) {
      if (counters.lastDir === dir) {
        if (dir === 'up') {
          counters.consecutiveUp++;
          if (counters.consecutiveUp >= 5 && !clone.active) {
            activateClone();
            counters.consecutiveUp = 0;
          }
        } else if (dir === 'down') {
          counters.consecutiveDown++;
          if (counters.consecutiveDown >= 7 && !babyKing.active) {
            activateBabyKing();
            counters.consecutiveDown = 0;
          }
        }
      } else {
        counters.consecutiveUp = 0;
        counters.consecutiveDown = 0;
      }
      counters.lastDir = dir;
    }

    function activateClone() {
      clone.active = true;
      clone.x = 250 - CHAR_W/2;
      clone.y = 250 - CHAR_H/2;
      clone.spriteCol = SPRITES.IDLE.col;
      clone.spriteRow = SPRITES.IDLE.row;
      clone.flipX = false;
      clone.talked = false;
      clone.cooldown = 300;
      counters.stepsSinceSpawn = 0;
      console.log('👥 Clon activado');
    }

    function activateBabyKing() {
      babyKing.active = true;
      babyKing.x = 250 - CHAR_W/2;
      babyKing.y = 250 - CHAR_H/2;
      babyKing.spriteCol = SPRITES.BABY_KING.col;
      babyKing.spriteRow = SPRITES.BABY_KING.row;
      babyKing.flipX = false;
      babyKing.talked = false;
      babyKing.cooldown = 300;
      counters.stepsSinceSpawn = 0;
      console.log('👑 Baby King activado');
    }

    function updateCooldowns() {
      if (clone.active && clone.cooldown > 0) {
        clone.cooldown--;
        if (clone.cooldown === 0) console.log('⏳ Cooldown del Clon terminado');
      }
      if (babyKing.active && babyKing.cooldown > 0) {
        babyKing.cooldown--;
        if (babyKing.cooldown === 0) console.log('⏳ Cooldown de Baby King terminado');
      }
      if (dialogCooldown > 0) {
        dialogCooldown--;
      }
    }

    function checkBoundaryAndRecord() {
      const margin = 5;
      const dirsTriggered = [];

      if (player.y + player.height < -margin) {
        player.y = canvas.height + margin;
        dirsTriggered.push('up');
      } else if (player.y > canvas.height + margin) {
        player.y = -player.height - margin;
        dirsTriggered.push('down');
      }

      if (player.x + player.width < -margin) {
        player.x = canvas.width + margin;
        dirsTriggered.push('left');
      } else if (player.x > canvas.width + margin) {
        player.x = -player.width - margin;
        dirsTriggered.push('right');
      }

      for (const dir of dirsTriggered) {
        recordStep(dir);
        let shouldDespawn = false;
        if (clone.active && clone.cooldown === 0) shouldDespawn = true;
        if (babyKing.active && babyKing.cooldown === 0) shouldDespawn = true;
        if (shouldDespawn) {
          counters.stepsSinceSpawn++;
          if (counters.stepsSinceSpawn >= 1) {
            despawnCharacters();
          }
        }
      }
    }

    // ==================== INTERACCIÓN ====================
    function checkInteraction() {
      if (dialogCooldown > 0 || eventSequence) return false;

      if (dialog.active && dialog.complete) {
        if (dialog.lines && dialog.lineIndex < dialog.lines.length - 1) {
          advanceDialogLine();
          return true;
        }

        const speaker = dialog.speaker;
        dialog.active = false;
        dialogCooldown = 12;
        console.log('💬 Diálogo cerrado');
        if (speaker === 'clone') {
          bgMusicStoppedForever = true;
          bgMusic.pause();
          startCloneSequence();
        } else if (speaker === 'babyKing') {
          bgMusicStoppedForever = true;
          bgMusic.pause();
          startBabyKingSequence();
        }
        return true;
      }

      if (dialog.active) return false;
      if (player.moving) return false;

      const interactDist = INTERACT_DIST;

      for (let obj of worldObjects) {
        if (obj.dialog === null) continue;
        const dx = (player.x + player.width/2) - (obj.x + obj.width/2);
        const dy = (player.y + player.height/2) - (obj.y + obj.height/2);
        if (Math.sqrt(dx*dx + dy*dy) < interactDist) {
          startDialog(obj.dialog, obj, 'fast');
          return true;
        }
      }

      if (clone.active && !clone.talked) {
        const dx = (player.x + player.width/2) - (clone.x + clone.width/2);
        const dy = (player.y + player.height/2) - (clone.y + clone.height/2);
        if (Math.sqrt(dx*dx + dy*dy) < interactDist) {
          startDialog('* We loomed too high, did we?', 'clone', 'slow');
          clone.talked = true;
          return true;
        }
      }

      if (babyKing.active && !babyKing.talked) {
        const dx = (player.x + player.width/2) - (babyKing.x + babyKing.width/2);
        const dy = (player.y + player.height/2) - (babyKing.y + babyKing.height/2);
        if (Math.sqrt(dx*dx + dy*dy) < interactDist) {
          startDialog('* I loomed too high, did i?', 'babyKing', 'slow');
          babyKing.talked = true;
          return true;
        }
      }

      return false;
    }

    // ==================== UPDATE ====================
    function update() {
      if (eventSequence) {
        updateSequence();
        syncBackgroundMusic();
        return;
      }

      let dx=0, dy=0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx!==0 && dy!==0) { dx*=0.7071; dy*=0.7071; }

      const moving = (dx!==0 || dy!==0);
      player.moving = moving;

      let speedMultiplier = 1;
      if (keys.action && !dialog.active && moving) {
        speedMultiplier = 2.0;
      }
      const currentSpeed = BASE_SPEED * speedMultiplier;

      updateCooldowns();

      if (moving && !dialog.active) {
        let newX = player.x + dx * currentSpeed;
        let newY = player.y + dy * currentSpeed;
        const testRect = { x: newX, y: newY, width: player.width, height: player.height };

        if (!isCollidingWithWorld(testRect)) {
          player.x = newX;
          player.y = newY;
          checkBoundaryAndRecord();
        } else {
          let moved = false;
          if (dx !== 0) {
            const testX = { x: newX, y: player.y, width: player.width, height: player.height };
            if (!isCollidingWithWorld(testX)) {
              player.x = newX;
              checkBoundaryAndRecord();
              moved = true;
            }
          }
          if (dy !== 0 && !moved) {
            const testY = { x: player.x, y: newY, width: player.width, height: player.height };
            if (!isCollidingWithWorld(testY)) {
              player.y = newY;
              checkBoundaryAndRecord();
            }
          }
        }

        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';

        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame;
        }

        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = (player.frame === 0) ? SPRITES.WALK1.col : SPRITES.WALK2.col;
          player.spriteRow = SPRITES.WALK1.row;
          player.flipX = false;
        } else {
          player.spriteCol = (player.frame === 0) ? SPRITES.SIDE_WALK.col : SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
      } else if (!dialog.active) {
        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = SPRITES.IDLE.col;
          player.spriteRow = SPRITES.IDLE.row;
          player.flipX = false;
        } else {
          player.spriteCol = SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
        player.frame = 0;
        player.frameTimer = 0;
      }

      updateDialog();
      syncBackgroundMusic();
    }

    // ==================== DRAW ====================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (eventSequence) {
        if (eventSequence === 'clone') {
          ctx.fillStyle = 'black';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (eventSequence === 'babyKing') {
          const color = getSequenceColor();
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          } else {
            const kingSprite = SPRITES.KING;
            const sx = kingSprite.col * SPRITE_W;
            const sy = kingSprite.row * SPRITE_H;
            const w = SPRITE_W * KING_SCALE;
            const h = SPRITE_H * KING_SCALE;
            const cx = (canvas.width - w) / 2;
            const cy = (canvas.height - h) / 2;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, cx, cy, w, h);
          }
        }
        return;
      }

      ctx.fillStyle = '#353535';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#454545';
      for (let i=0; i<canvas.width; i+=60) {
        for (let j=0; j<canvas.height; j+=60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      if (sheetLoaded) {
        for (let obj of worldObjects) {
          const sx = obj.spriteCol * SPRITE_W;
          const sy = obj.spriteRow * SPRITE_H;
          ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, obj.x, obj.y, obj.width, obj.height);
        }

        if (clone.active) {
          const sx = clone.spriteCol * SPRITE_W;
          const sy = clone.spriteRow * SPRITE_H;
          ctx.globalAlpha = 0.7;
          ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, clone.x, clone.y, clone.width, clone.height);
          ctx.globalAlpha = 1.0;
        }

        if (babyKing.active) {
          const sx = babyKing.spriteCol * SPRITE_W;
          const sy = babyKing.spriteRow * SPRITE_H;
          ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, babyKing.x, babyKing.y, babyKing.width, babyKing.height);
        }

        const sx = player.spriteCol * SPRITE_W;
        const sy = player.spriteRow * SPRITE_H;
        if (player.flipX) {
          ctx.save();
          ctx.translate(player.x + player.width/2, player.y + player.height/2);
          ctx.scale(-1, 1);
          ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, -player.width/2, -player.height/2, player.width, player.height);
          ctx.restore();
        } else {
          ctx.drawImage(spriteSheet, sx, sy, SPRITE_W, SPRITE_H, player.x, player.y, player.width, player.height);
        }
      } else {
        ctx.fillStyle = '#808080';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = '#e0e0e0';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }

      drawDialog();
    }

    // ==================== GAMELOOP ====================
    let rafId = null;
    function gameLoop() {
      update();
      draw();
      rafId = requestAnimationFrame(gameLoop);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (rafId) cancelAnimationFrame(rafId);
        shadowAudio.pause();
        colorAudio.pause();
        bgMusic.pause();
      } else {
        gameLoop();
        syncBackgroundMusic();
      }
    });

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
        e.preventDefault();
      }
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = true;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = true;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = true;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = true;

      if (key === 'z'||key==='Z') {
        e.preventDefault();
        keys.action = true;
        if (dialog.active && dialog.complete) {
          checkInteraction();
        }
      }
    }

    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
        e.preventDefault();
      }
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = false;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = false;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = false;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = false;

      if (key === 'z'||key==='Z') {
        e.preventDefault();
        keys.action = false;
        if (!dialog.active && !player.moving && !eventSequence) {
          checkInteraction();
        }
      }
    }

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== CONTROLES TÁCTILES ====================
    function setupTouchControls() {
      const dpadBtns = document.querySelectorAll('.dpad-btn');
      const actionBtn = document.getElementById('actionBtn');

      function assignTouchEvents(element, keyOn, keyOff) {
        element.addEventListener('touchstart', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        }, { passive: false });
        element.addEventListener('touchend', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });
        element.addEventListener('touchcancel', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });
        element.addEventListener('mousedown', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        });
        element.addEventListener('mouseup', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        });
        element.addEventListener('mouseleave', (e) => {
          keys[keyOn] = false;
        });
      }

      dpadBtns.forEach(btn => {
        const dir = btn.dataset.dir;
        if (dir === 'up') assignTouchEvents(btn, 'up', 'down');
        else if (dir === 'down') assignTouchEvents(btn, 'down', 'up');
        else if (dir === 'left') assignTouchEvents(btn, 'left', 'right');
        else if (dir === 'right') assignTouchEvents(btn, 'right', 'left');
      });

      actionBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        keys.action = true;
        if (dialog.active && dialog.complete) {
          checkInteraction();
        }
      }, { passive: false });

      actionBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys.action = false;
        if (!dialog.active && !player.moving && !eventSequence) {
          checkInteraction();
        }
      }, { passive: false });

      actionBtn.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        keys.action = false;
      }, { passive: false });

      actionBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        keys.action = true;
        if (dialog.active && dialog.complete) {
          checkInteraction();
        }
      });

      actionBtn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        keys.action = false;
        if (!dialog.active && !player.moving && !eventSequence) {
          checkInteraction();
        }
      });
      actionBtn.addEventListener('mouseleave', (e) => {
        keys.action = false;
      });
    }
    setupTouchControls();

    // ==================== INICIO ====================
    function ensurePlayerSpawn() {
      const testRect = { x: player.x, y: player.y, width: player.width, height: player.height };
      if (isCollidingWithWorld(testRect)) {
        for (let y = 20; y < canvas.height - player.height - 20; y += 10) {
          for (let x = 20; x < canvas.width - player.width - 20; x += 10) {
            const test = { x, y, width: player.width, height: player.height };
            if (!isCollidingWithWorld(test)) {
              player.x = x;
              player.y = y;
              console.log(`🔄 Jugador reubicado a (${x}, ${y})`);
              return;
            }
          }
        }
      }
    }

    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
    }
    gameLoop();
    updateUI();
    tryPlayBgMusic();
    setTimeout(ensurePlayerSpawn, 100);

    console.log('🎮 Colisión centrada, interacción independiente, sprites a escala 4.3.');
    console.log('⬆ 5 pasos → Clon');
    console.log('⬇ 7 pasos → Baby King');
  })();
</script>
