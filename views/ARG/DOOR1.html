<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zelda - Aventura CRT</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background:#1a1a1a;
      display:flex; justify-content:center; align-items:center;
      height:100vh; overflow:hidden;
      font-family:'Courier New',monospace;
      touch-action: none; /* Evita gestos del navegador */
    }
    .game-wrapper {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:15px;
      padding:10px;
    }
    .game-container {
      position:relative;
      background:#2a2a2a;
      border:3px solid #444;
      border-radius:8px;
      padding:10px;
      box-shadow:0 0 30px rgba(0,0,0,0.8);
      touch-action: none;
    }
    canvas {
      display:block;
      width:500px;
      height:500px;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      background:#3a3a3a;
      cursor:none;
      touch-action: none;
    }

    /* ==================== OVERLAY CRT ==================== */
    .crt-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      pointer-events: none;
      z-index: 10;
      border-radius: 4px;
      overflow: hidden;
    }
    .crt-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 11;
    }
    .crt-overlay::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        transparent 60%,
        rgba(0, 0, 0, 0.4) 100%
      );
      pointer-events: none;
      z-index: 12;
    }
    @keyframes flicker {
      0% { opacity: 0.97; }
      50% { opacity: 1; }
      100% { opacity: 0.97; }
    }
    .crt-overlay {
      animation: flicker 0.15s infinite alternate;
    }

    /* ==================== CONTROLES TÁCTILES ==================== */
    .touch-controls {
      display: none; /* Ocultos por defecto (PC) */
      width: 100%;
      max-width: 500px;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      touch-action: none;
      padding: 0 10px;
    }

    /* D-Pad (flechas) */
    .dpad {
      position: relative;
      width: 160px;
      height: 160px;
      touch-action: none;
    }
    .dpad-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      cursor: pointer;
      transition: background 0.1s;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active {
      background: rgba(255,255,255,0.35);
      border-color: rgba(255,255,255,0.6);
    }
    .dpad-up    { top: 0; left: 55px; }
    .dpad-down  { bottom: 0; left: 55px; }
    .dpad-left  { top: 55px; left: 0; }
    .dpad-right { top: 55px; right: 0; }

    /* Botón de acción (Z) */
    .action-btn {
      width: 80px;
      height: 80px;
      background: rgba(255,200,50,0.2);
      border: 3px solid rgba(255,200,50,0.5);
      border-radius: 50%;
      color: rgba(255,200,50,0.8);
      font-size: 18px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      cursor: pointer;
      transition: all 0.1s;
      text-shadow: 0 0 10px rgba(255,200,50,0.3);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 1px;
    }
    .action-btn:active {
      background: rgba(255,200,50,0.4);
      border-color: rgba(255,200,50,0.8);
      transform: scale(0.92);
    }

    .controls-info {
      color: rgba(255,255,255,0.2);
      text-align: center;
      font-size: 14px;
      padding: 4px 0;
      letter-spacing: 1px;
    }
    .controls-info span {
      display: inline-block;
      margin: 0 10px;
    }

    /* ==================== RESPONSIVE: Mostrar controles en móvil ==================== */
    @media (pointer: coarse) {
      .touch-controls {
        display: flex; /* Visible en táctiles */
      }
      .controls-info .pc-only {
        display: none;
      }
      .controls-info .mobile-only {
        display: inline-block;
      }
    }
    @media (pointer: fine) {
      .controls-info .pc-only {
        display: inline-block;
      }
      .controls-info .mobile-only {
        display: none;
      }
    }

    /* Ajuste para pantallas pequeñas */
    @media (max-width: 560px) {
      canvas {
        width: 90vw;
        height: 90vw;
        max-width: 500px;
        max-height: 500px;
      }
      .game-container {
        padding: 6px;
      }
      .crt-overlay {
        top: 6px;
        left: 6px;
        width: calc(100% - 12px);
        height: calc(100% - 12px);
      }
      .dpad {
        width: 130px;
        height: 130px;
      }
      .dpad-btn {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }
      .dpad-up    { top: 0; left: 45px; }
      .dpad-down  { bottom: 0; left: 45px; }
      .dpad-left  { top: 45px; left: 0; }
      .dpad-right { top: 45px; right: 0; }
      .action-btn {
        width: 65px;
        height: 65px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <!-- OVERLAY CRT -->
    <div class="crt-overlay"></div>
  </div>

  <div class="controls-info">
    <span class="pc-only">WASD / Flechas · Z = acción</span>
    <span class="mobile-only">Botones táctiles</span>
  </div>

  <!-- CONTROLES TÁCTILES -->
  <div class="touch-controls" id="touchControls">
    <div class="dpad" id="dpad">
      <button class="dpad-btn dpad-up"    data-dir="up">▲</button>
      <button class="dpad-btn dpad-down"  data-dir="down">▼</button>
      <button class="dpad-btn dpad-left"  data-dir="left">◀</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <button class="action-btn" id="actionBtn">⚡ Z</button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ==================== SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png';
    const SPRITE_W = 22;
    const SPRITE_H = 28;
    const SCALE = 2.18;
    const CHAR_W = Math.round(SPRITE_W * SCALE);
    const CHAR_H = Math.round(SPRITE_H * SCALE);

    const SPRITES = {
      IDLE:      { col:0, row:0 },
      WALK1:     { col:1, row:0 },
      WALK2:     { col:2, row:0 },
      SIDE_IDLE: { col:3, row:0 },
      SIDE_WALK: { col:4, row:0 },
    };

    // ==================== JUGADOR ====================
    const player = {
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      speed: 1.5,
      dir: 'down',
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 10,
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
    };

    // ==================== TECLAS ====================
    const keys = { up:false, down:false, left:false, right:false, action:false };

    // ==================== CARGA DE SPRITE SHEET ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;

    spriteSheet.onload = () => {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado');
    };
    spriteSheet.onerror = () => {
      console.error('❌ Error al cargar el sprite sheet. Verifica la ruta:', SPRITE_SHEET_URL);
      ctx.fillStyle = 'red';
      ctx.font = '16px monospace';
      ctx.fillText('Error: no se encontró el sprite sheet', 150, 250);
    };

    // ==================== ACTUALIZACIÓN ====================
    function update() {
      let dx=0, dy=0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx!==0 && dy!==0) { dx*=0.7071; dy*=0.7071; }

      const moving = (dx!==0 || dy!==0);
      player.moving = moving;

      if (moving) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';

        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame;
        }

        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = (player.frame === 0) ? SPRITES.WALK1.col : SPRITES.WALK2.col;
          player.spriteRow = SPRITES.WALK1.row;
          player.flipX = false;
        } else {
          player.spriteCol = (player.frame === 0) ? SPRITES.SIDE_WALK.col : SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
      } else {
        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = SPRITES.IDLE.col;
          player.spriteRow = SPRITES.IDLE.row;
          player.flipX = false;
        } else {
          player.spriteCol = SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
        player.frame = 0;
        player.frameTimer = 0;
      }

      // ====== ACCIÓN (tecla Z) ======
      if (keys.action) {
        // Aquí puedes poner la lógica de acción (ej. hablar, atacar, etc.)
        // Por ahora solo mostramos un mensaje en consola
        console.log('⚡ Acción!');
        keys.action = false; // Para que no se repita
      }
    }

    // ==================== DIBUJADO ====================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Fondo
      ctx.fillStyle = '#2e5a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#3a6b4a';
      for (let i=0; i<canvas.width; i+=60) {
        for (let j=0; j<canvas.height; j+=60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      if (sheetLoaded) {
        const sx = player.spriteCol * SPRITE_W;
        const sy = player.spriteRow * SPRITE_H;
        ctx.imageSmoothingEnabled = false;

        if (player.flipX) {
          ctx.save();
          ctx.translate(player.x + player.width/2, player.y + player.height/2);
          ctx.scale(-1, 1);
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            -player.width/2, -player.height/2, player.width, player.height
          );
          ctx.restore();
        } else {
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x, player.y, player.width, player.height
          );
        }
      } else {
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = 'white';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }
    }

    // ==================== BUCLE ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = true;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = true;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = true;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = true;
      if (key === 'z'||key==='Z') { keys.action = true; e.preventDefault(); }
    }
    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = false;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = false;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = false;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = false;
      if (key === 'z'||key==='Z') keys.action = false;
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== CONTROLES TÁCTILES ====================
    function setupTouchControls() {
      const dpadBtns = document.querySelectorAll('.dpad-btn');
      const actionBtn = document.getElementById('actionBtn');

      // Función para asignar eventos táctiles a cada botón
      function assignTouchEvents(element, keyOn, keyOff) {
        // Para móviles táctiles
        element.addEventListener('touchstart', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        }, { passive: false });

        element.addEventListener('touchend', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });

        element.addEventListener('touchcancel', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });

        // Para mouse (debug en PC con click)
        element.addEventListener('mousedown', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        });

        element.addEventListener('mouseup', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        });

        element.addEventListener('mouseleave', (e) => {
          keys[keyOn] = false;
        });
      }

      // Asignar eventos a cada flecha
      dpadBtns.forEach(btn => {
        const dir = btn.dataset.dir;
        if (dir === 'up') assignTouchEvents(btn, 'up', 'down');
        else if (dir === 'down') assignTouchEvents(btn, 'down', 'up');
        else if (dir === 'left') assignTouchEvents(btn, 'left', 'right');
        else if (dir === 'right') assignTouchEvents(btn, 'right', 'left');
      });

      // Botón de acción
      assignTouchEvents(actionBtn, 'action');
    }

    // Inicializar controles táctiles
    setupTouchControls();

    // ==================== INICIO ====================
    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado desde caché');
    }
    gameLoop();
    console.log('🎮 Juego iniciado con controles táctiles y tecla Z.');
  })();
</script>
</body>
</html>
