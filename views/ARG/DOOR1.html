<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zelda - Aventura</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background:#1a1a1a;
      display:flex; justify-content:center; align-items:center;
      height:100vh; overflow:hidden;
      font-family:'Courier New',monospace;
    }
    .game-container {
      position:relative;
      background:#2a2a2a;
      border:3px solid #444;
      border-radius:8px;
      padding:10px;
      box-shadow:0 0 30px rgba(0,0,0,0.8);
    }
    canvas {
      display:block;
      width:500px;
      height:500px;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      background:#3a3a3a;
      cursor:none;
    }
    .controls-info {
      color:rgba(255,255,255,0.2);
      text-align:center;
      font-size:14px;
      padding:8px 0;
      letter-spacing:1px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="500" height="500"></canvas>
  <div class="controls-info">WASD / Flechas para mover</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ==================== SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png';
    const SPRITE_W = 22;
    const SPRITE_H = 28;
    const SCALE = 2.18;
    const CHAR_W = Math.round(SPRITE_W * SCALE); // 48
    const CHAR_H = Math.round(SPRITE_H * SCALE); // 61

    // Índices de sprite (columna, fila) según tu hoja de 4 filas x 6 columnas
    const SPRITES = {
      // Fila 0: frontal
      IDLE:      { col:0, row:0 },
      WALK1:     { col:1, row:0 },
      WALK2:     { col:2, row:0 },
      // Fila 1: lateral (perfil)
      SIDE_IDLE: { col:4, row:1 },   // <-- perfil quieto
      SIDE_WALK: { col:5, row:1 },   // <-- perfil caminando (alterna con SIDE_IDLE)
    };

    // ==================== JUGADOR ====================
    const player = {
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      speed: 1.5,
      dir: 'down',      // 'up', 'down', 'left', 'right'
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 10,   // más lento para que se vea bien
      // Sprite actual
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
    };

    // ==================== TECLAS ====================
    const keys = { up:false, down:false, left:false, right:false };

    // ==================== CARGA DE SPRITE SHEET ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;

    spriteSheet.onload = () => {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado');
    };
    spriteSheet.onerror = () => {
      console.error('❌ Error al cargar el sprite sheet. Verifica la ruta:', SPRITE_SHEET_URL);
      ctx.fillStyle = 'red';
      ctx.font = '16px monospace';
      ctx.fillText('Error: no se encontró el sprite sheet', 150, 250);
    };

    // ==================== ACTUALIZACIÓN ====================
    function update() {
      let dx=0, dy=0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx!==0 && dy!==0) { dx*=0.7071; dy*=0.7071; }

      const moving = (dx!==0 || dy!==0);
      player.moving = moving;

      if (moving) {
        // Movimiento
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        // Actualizar dirección
        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';

        // Animación de caminata
        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame; // alterna 0 y 1
        }

        // Seleccionar sprite según dirección
        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          // Vertical: alternar entre WALK1 y WALK2 (fila 0)
          player.spriteCol = (player.frame === 0) ? SPRITES.WALK1.col : SPRITES.WALK2.col;
          player.spriteRow = SPRITES.WALK1.row;
          player.flipX = false;
        } else { // left o right
          // Lateral: alternar entre SIDE_WALK y SIDE_IDLE (fila 1)
          // frame=0 → caminando, frame=1 → quieto (efecto de pasos)
          if (player.frame === 0) {
            player.spriteCol = SPRITES.SIDE_WALK.col;
          } else {
            player.spriteCol = SPRITES.SIDE_IDLE.col;
          }
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          // Si va a la izquierda, aplicar espejo
          player.flipX = (dir === 'left');
        }
      } else {
        // ====== QUIETO: mantener dirección ======
        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          // Frontal quieto (fila 0, col 0)
          player.spriteCol = SPRITES.IDLE.col;
          player.spriteRow = SPRITES.IDLE.row;
          player.flipX = false;
        } else { // left o right
          // Perfil quieto (fila 1, col 4)
          player.spriteCol = SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
        // Reiniciar animación
        player.frame = 0;
        player.frameTimer = 0;
      }
    }

    // ==================== DIBUJADO ====================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Fondo
      ctx.fillStyle = '#2e5a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#3a6b4a';
      for (let i=0; i<canvas.width; i+=60) {
        for (let j=0; j<canvas.height; j+=60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      if (sheetLoaded) {
        const sx = player.spriteCol * SPRITE_W;
        const sy = player.spriteRow * SPRITE_H;

        ctx.imageSmoothingEnabled = false;

        if (player.flipX) {
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x + player.width, player.y,
            -player.width, player.height
          );
        } else {
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x, player.y,
            player.width, player.height
          );
        }
      } else {
        // Fallback
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = 'white';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }
    }

    // ==================== BUCLE ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = true;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = true;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = true;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = true;
    }
    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = false;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = false;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = false;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = false;
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== INICIO ====================
    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado desde caché');
    }
    gameLoop();
    console.log('🎮 Juego iniciado. Dirección lateral mantenida al detenerse.');
  })();
</script>
</body>
</html>
