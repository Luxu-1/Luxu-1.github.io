<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zelda - Aventura CRT</title>
  <link rel="icon" type="image/png" href="/media/texture/icon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background:#1a1a1a;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh;
      overflow:hidden;
      font-family:'Courier New',monospace;
      touch-action: none;
    }
    .game-wrapper {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      padding:10px;
    }
    .game-container {
      position:relative;
      background:#2a2a2a;
      border:3px solid #444;
      border-radius:8px;
      padding:10px;
      box-shadow:0 0 30px rgba(0,0,0,0.8);
      touch-action: none;
    }
    canvas {
      display:block;
      width:500px;
      height:500px;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      background:#3a3a3a;
      cursor:none;
      touch-action: none;
    }

    /* ==================== OVERLAY CRT ==================== */
    .crt-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      pointer-events: none;
      z-index: 10;
      border-radius: 4px;
      overflow: hidden;
    }
    .crt-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 11;
    }
    .crt-overlay::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        transparent 60%,
        rgba(0, 0, 0, 0.4) 100%
      );
      pointer-events: none;
      z-index: 12;
    }
    @keyframes flicker {
      0% { opacity: 0.97; }
      50% { opacity: 1; }
      100% { opacity: 0.97; }
    }
    .crt-overlay {
      animation: flicker 0.15s infinite alternate;
    }

    /* ==================== INFO ==================== */
    .info-bar {
      display:flex;
      justify-content:space-between;
      width:100%;
      max-width:500px;
      color:rgba(255,255,255,0.15);
      font-size:13px;
      letter-spacing:1px;
      padding:0 5px;
    }
    .info-bar span {
      background:rgba(255,255,255,0.03);
      padding:4px 10px;
      border-radius:4px;
      border:1px solid rgba(255,255,255,0.05);
    }
    .info-bar .highlight {
      color:rgba(255,255,255,0.4);
    }

    .controls-info {
      color:rgba(255,255,255,0.2);
      text-align:center;
      font-size:14px;
      padding:4px 0;
      letter-spacing:1px;
    }

    /* ==================== CONTROLES TÁCTILES ==================== */
    .touch-controls {
      display: none;
      width:100%;
      max-width:500px;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      touch-action: none;
      padding:0 10px;
    }
    .dpad {
      position:relative;
      width:160px;
      height:160px;
      touch-action:none;
    }
    .dpad-btn {
      position:absolute;
      width:50px;
      height:50px;
      background:rgba(255,255,255,0.15);
      border:2px solid rgba(255,255,255,0.3);
      border-radius:10px;
      color:rgba(255,255,255,0.7);
      font-size:28px;
      display:flex;
      justify-content:center;
      align-items:center;
      touch-action:none;
      cursor:pointer;
      transition:background 0.1s;
      -webkit-tap-highlight-color:transparent;
    }
    .dpad-btn:active {
      background:rgba(255,255,255,0.35);
      border-color:rgba(255,255,255,0.6);
    }
    .dpad-up    { top:0; left:55px; }
    .dpad-down  { bottom:0; left:55px; }
    .dpad-left  { top:55px; left:0; }
    .dpad-right { top:55px; right:0; }

    .action-btn {
      width:80px;
      height:80px;
      background:rgba(255,200,50,0.2);
      border:3px solid rgba(255,200,50,0.5);
      border-radius:50%;
      color:rgba(255,200,50,0.8);
      font-size:18px;
      font-family:'Courier New',monospace;
      font-weight:bold;
      display:flex;
      justify-content:center;
      align-items:center;
      touch-action:none;
      cursor:pointer;
      transition:all 0.1s;
      -webkit-tap-highlight-color:transparent;
    }
    .action-btn:active {
      background:rgba(255,200,50,0.4);
      border-color:rgba(255,200,50,0.8);
      transform:scale(0.92);
    }

    @media (pointer: coarse) {
      .touch-controls { display:flex; }
      .controls-info .pc-only { display:none; }
      .controls-info .mobile-only { display:inline-block; }
    }
    @media (pointer: fine) {
      .controls-info .pc-only { display:inline-block; }
      .controls-info .mobile-only { display:none; }
    }
    @media (max-width:560px) {
      canvas { width:90vw; height:90vw; max-width:500px; max-height:500px; }
      .game-container { padding:6px; }
      .crt-overlay { top:6px; left:6px; width:calc(100% - 12px); height:calc(100% - 12px); }
      .dpad { width:130px; height:130px; }
      .dpad-btn { width:40px; height:40px; font-size:22px; }
      .dpad-up    { top:0; left:45px; }
      .dpad-down  { bottom:0; left:45px; }
      .dpad-left  { top:45px; left:0; }
      .dpad-right { top:45px; right:0; }
      .action-btn { width:65px; height:65px; font-size:15px; }
      .info-bar { font-size:11px; flex-wrap:wrap; gap:5px; justify-content:center; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="crt-overlay"></div>
  </div>

  <div class="info-bar">
    <span>⬆ <span id="upCounter" class="highlight">0</span></span>
    <span>⬇ <span id="downCounter" class="highlight">0</span></span>
    <span>⬅ <span id="leftCounter" class="highlight">0</span></span>
    <span>➡ <span id="rightCounter" class="highlight">0</span></span>
    <span>🚶 <span id="totalSteps" class="highlight">0</span></span>
  </div>

  <div class="controls-info">
    <span class="pc-only">WASD / Flechas · Z = acción</span>
    <span class="mobile-only">Botones táctiles</span>
  </div>

  <div class="touch-controls" id="touchControls">
    <div class="dpad" id="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <button class="action-btn" id="actionBtn">⚡ Z</button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ==================== SPRITE SHEET ====================
    const SPRITE_SHEET_URL = '/media/texture/sprite_sheet.png';
    const SPRITE_W = 22;
    const SPRITE_H = 28;
    const SCALE = 4.18; // Aumentado!
    const CHAR_W = Math.round(SPRITE_W * SCALE);
    const CHAR_H = Math.round(SPRITE_H * SCALE);

    // Índices de sprites (fila, columna) según tu tabla
    const SPRITES = {
      // Fila 0: frontal
      IDLE:      { col:0, row:0 },
      WALK1:     { col:1, row:0 },
      WALK2:     { col:2, row:0 },
      SIDE_IDLE: { col:3, row:0 },
      SIDE_WALK: { col:4, row:0 },
      // Fila 2: Baby King y King
      BABY_KING: { col:0, row:2 },
      KING:      { col:1, row:2 },
      // Fila 1: Angel
      ANGEL:     { col:0, row:1 },
    };

    // ==================== JUGADOR ====================
    const player = {
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      speed: 1.5,
      dir: 'down',
      moving: false,
      frame: 0,
      frameTimer: 0,
      frameDelay: 10,
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
    };

    // ==================== CLON ====================
    const clone = {
      active: false,
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      spriteCol: SPRITES.IDLE.col,
      spriteRow: SPRITES.IDLE.row,
      flipX: false,
      timer: 0,
      duration: 180, // 3 segundos a 60fps
    };

    // ==================== BABY KING ====================
    const babyKing = {
      active: false,
      x: 250 - CHAR_W/2,
      y: 250 - CHAR_H/2,
      width: CHAR_W,
      height: CHAR_H,
      spriteCol: SPRITES.BABY_KING.col,
      spriteRow: SPRITES.BABY_KING.row,
      flipX: false,
      timer: 0,
      duration: 180,
    };

    // ==================== CONTADORES ====================
    const counters = {
      up: 0,
      down: 0,
      left: 0,
      right: 0,
      total: 0,
      // Para contar pasos SEGUIDOS en cada dirección
      consecutiveUp: 0,
      consecutiveDown: 0,
      // Última dirección para saber si es consecutiva
      lastDir: null,
    };

    // ==================== TECLAS ====================
    const keys = { up:false, down:false, left:false, right:false, action:false };

    // ==================== ELEMENTOS UI ====================
    const upCounterEl = document.getElementById('upCounter');
    const downCounterEl = document.getElementById('downCounter');
    const leftCounterEl = document.getElementById('leftCounter');
    const rightCounterEl = document.getElementById('rightCounter');
    const totalStepsEl = document.getElementById('totalSteps');

    function updateUI() {
      upCounterEl.textContent = counters.up;
      downCounterEl.textContent = counters.down;
      leftCounterEl.textContent = counters.left;
      rightCounterEl.textContent = counters.right;
      totalStepsEl.textContent = counters.total;
    }

    // ==================== CARGA DE SPRITE SHEET ====================
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_SHEET_URL;
    let sheetLoaded = false;

    spriteSheet.onload = () => {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado');
    };
    spriteSheet.onerror = () => {
      console.error('❌ Error al cargar el sprite sheet. Verifica la ruta:', SPRITE_SHEET_URL);
      ctx.fillStyle = 'red';
      ctx.font = '16px monospace';
      ctx.fillText('Error: no se encontró el sprite sheet', 150, 250);
    };

    // ==================== TELEPORT PAC-MAN ====================
    function teleportPlayer() {
      const margin = 20;
      // Si sale por arriba, aparece abajo
      if (player.y + player.height < -margin) {
        player.y = canvas.height + margin;
        // Contar paso hacia arriba
        counters.up++;
        counters.total++;
        handleConsecutive('up');
        updateUI();
      }
      // Si sale por abajo, aparece arriba
      else if (player.y > canvas.height + margin) {
        player.y = -player.height - margin;
        counters.down++;
        counters.total++;
        handleConsecutive('down');
        updateUI();
      }
      // Si sale por izquierda, aparece derecha
      else if (player.x + player.width < -margin) {
        player.x = canvas.width + margin;
        counters.left++;
        counters.total++;
        handleConsecutive('left');
        updateUI();
      }
      // Si sale por derecha, aparece izquierda
      else if (player.x > canvas.width + margin) {
        player.x = -player.width - margin;
        counters.right++;
        counters.total++;
        handleConsecutive('right');
        updateUI();
      }
    }

    // ==================== MANEJAR PASOS CONSECUTIVOS ====================
    function handleConsecutive(dir) {
      if (counters.lastDir === dir) {
        // Misma dirección → incrementar contador consecutivo
        if (dir === 'up') {
          counters.consecutiveUp++;
          // Si llega a 6 pasos seguidos hacia arriba → CLON
          if (counters.consecutiveUp >= 6) {
            activateClone();
            counters.consecutiveUp = 0; // Resetear
          }
        } else if (dir === 'down') {
          counters.consecutiveDown++;
          // Si llega a 8 pasos seguidos hacia abajo → BABY KING
          if (counters.consecutiveDown >= 8) {
            activateBabyKing();
            counters.consecutiveDown = 0;
          }
        }
      } else {
        // Cambió de dirección → resetear contadores consecutivos
        counters.consecutiveUp = 0;
        counters.consecutiveDown = 0;
      }
      counters.lastDir = dir;
    }

    // ==================== ACTIVAR CLON ====================
    function activateClone() {
      clone.active = true;
      clone.x = 250 - CHAR_W/2;
      clone.y = 250 - CHAR_H/2;
      clone.spriteCol = SPRITES.IDLE.col;
      clone.spriteRow = SPRITES.IDLE.row;
      clone.flipX = false;
      clone.timer = 0;
      console.log('👥 ¡Clon apareció!');
    }

    // ==================== ACTIVAR BABY KING ====================
    function activateBabyKing() {
      babyKing.active = true;
      babyKing.x = 250 - CHAR_W/2;
      babyKing.y = 250 - CHAR_H/2;
      babyKing.spriteCol = SPRITES.BABY_KING.col;
      babyKing.spriteRow = SPRITES.BABY_KING.row;
      babyKing.flipX = false;
      babyKing.timer = 0;
      console.log('👑 ¡Baby King apareció!');
    }

    // ==================== ACTUALIZACIÓN ====================
    function update() {
      let dx=0, dy=0;
      if (keys.up) dy = -1;
      if (keys.down) dy = 1;
      if (keys.left) dx = -1;
      if (keys.right) dx = 1;

      if (dx!==0 && dy!==0) { dx*=0.7071; dy*=0.7071; }

      const moving = (dx!==0 || dy!==0);
      player.moving = moving;

      if (moving) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        // Teleport (Pac-Man) en lugar de límites
        teleportPlayer();

        if (dx > 0) player.dir = 'right';
        else if (dx < 0) player.dir = 'left';
        else if (dy < 0) player.dir = 'up';
        else if (dy > 0) player.dir = 'down';

        player.frameTimer++;
        if (player.frameTimer >= player.frameDelay) {
          player.frameTimer = 0;
          player.frame = 1 - player.frame;
        }

        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = (player.frame === 0) ? SPRITES.WALK1.col : SPRITES.WALK2.col;
          player.spriteRow = SPRITES.WALK1.row;
          player.flipX = false;
        } else {
          player.spriteCol = (player.frame === 0) ? SPRITES.SIDE_WALK.col : SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
      } else {
        const dir = player.dir;
        if (dir === 'up' || dir === 'down') {
          player.spriteCol = SPRITES.IDLE.col;
          player.spriteRow = SPRITES.IDLE.row;
          player.flipX = false;
        } else {
          player.spriteCol = SPRITES.SIDE_IDLE.col;
          player.spriteRow = SPRITES.SIDE_IDLE.row;
          player.flipX = (dir === 'left');
        }
        player.frame = 0;
        player.frameTimer = 0;
      }

      // ====== ACTUALIZAR CLON ======
      if (clone.active) {
        clone.timer++;
        if (clone.timer >= clone.duration) {
          clone.active = false;
          console.log('👥 Clon desapareció');
        }
      }

      // ====== ACTUALIZAR BABY KING ======
      if (babyKing.active) {
        babyKing.timer++;
        if (babyKing.timer >= babyKing.duration) {
          babyKing.active = false;
          console.log('👑 Baby King desapareció');
        }
      }

      // ====== ACCIÓN ======
      if (keys.action) {
        console.log('⚡ Acción!');
        // Aquí puedes poner más lógica
        keys.action = false;
      }
    }

    // ==================== DIBUJADO ====================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Fondo
      ctx.fillStyle = '#2e5a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#3a6b4a';
      for (let i=0; i<canvas.width; i+=60) {
        for (let j=0; j<canvas.height; j+=60) {
          ctx.fillRect(i+5, j+5, 8, 8);
          ctx.fillRect(i+20, j+20, 8, 8);
        }
      }

      if (sheetLoaded) {
        // ====== DIBUJAR CLON ======
        if (clone.active) {
          const sx = clone.spriteCol * SPRITE_W;
          const sy = clone.spriteRow * SPRITE_H;
          ctx.globalAlpha = 0.6;
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            clone.x, clone.y, clone.width, clone.height
          );
          ctx.globalAlpha = 1.0;
        }

        // ====== DIBUJAR BABY KING ======
        if (babyKing.active) {
          const sx = babyKing.spriteCol * SPRITE_W;
          const sy = babyKing.spriteRow * SPRITE_H;
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            babyKing.x, babyKing.y, babyKing.width, babyKing.height
          );
        }

        // ====== DIBUJAR JUGADOR ======
        const sx = player.spriteCol * SPRITE_W;
        const sy = player.spriteRow * SPRITE_H;
        ctx.imageSmoothingEnabled = false;

        if (player.flipX) {
          ctx.save();
          ctx.translate(player.x + player.width/2, player.y + player.height/2);
          ctx.scale(-1, 1);
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            -player.width/2, -player.height/2, player.width, player.height
          );
          ctx.restore();
        } else {
          ctx.drawImage(
            spriteSheet,
            sx, sy, SPRITE_W, SPRITE_H,
            player.x, player.y, player.width, player.height
          );
        }
      } else {
        // Fallback
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = 'white';
        ctx.font = '12px monospace';
        ctx.fillText('Cargando...', player.x+2, player.y+15);
      }
    }

    // ==================== BUCLE ====================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ==================== EVENTOS DE TECLADO ====================
    function handleKeyDown(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = true;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = true;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = true;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = true;
      if (key === 'z'||key==='Z') { keys.action = true; e.preventDefault(); }
    }
    function handleKeyUp(e) {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) e.preventDefault();
      if (key === 'w'||key==='W'||key==='ArrowUp') keys.up = false;
      if (key === 's'||key==='S'||key==='ArrowDown') keys.down = false;
      if (key === 'a'||key==='A'||key==='ArrowLeft') keys.left = false;
      if (key === 'd'||key==='D'||key==='ArrowRight') keys.right = false;
      if (key === 'z'||key==='Z') keys.action = false;
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ==================== CONTROLES TÁCTILES ====================
    function setupTouchControls() {
      const dpadBtns = document.querySelectorAll('.dpad-btn');
      const actionBtn = document.getElementById('actionBtn');

      function assignTouchEvents(element, keyOn, keyOff) {
        element.addEventListener('touchstart', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        }, { passive: false });
        element.addEventListener('touchend', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });
        element.addEventListener('touchcancel', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        }, { passive: false });
        element.addEventListener('mousedown', (e) => {
          e.preventDefault();
          keys[keyOn] = true;
          if (keyOff) keys[keyOff] = false;
        });
        element.addEventListener('mouseup', (e) => {
          e.preventDefault();
          keys[keyOn] = false;
        });
        element.addEventListener('mouseleave', (e) => {
          keys[keyOn] = false;
        });
      }

      dpadBtns.forEach(btn => {
        const dir = btn.dataset.dir;
        if (dir === 'up') assignTouchEvents(btn, 'up', 'down');
        else if (dir === 'down') assignTouchEvents(btn, 'down', 'up');
        else if (dir === 'left') assignTouchEvents(btn, 'left', 'right');
        else if (dir === 'right') assignTouchEvents(btn, 'right', 'left');
      });
      assignTouchEvents(actionBtn, 'action');
    }
    setupTouchControls();

    // ==================== INICIO ====================
    if (spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
      sheetLoaded = true;
      console.log('✅ Sprite sheet cargado desde caché');
    }
    gameLoop();
    updateUI();
    console.log('🎮 Juego iniciado con teletransporte Pac-Man y eventos especiales.');
    console.log('⬆ 6 pasos seguidos hacia arriba → CLON');
    console.log('⬇ 8 pasos seguidos hacia abajo → BABY KING');
  })();
</script>
</body>
</html>
