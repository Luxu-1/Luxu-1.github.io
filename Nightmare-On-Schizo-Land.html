<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nightmare On Schizo-Land</title>
  <link rel="icon" type="image/png" href="NoS.ico">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: serif;
      letter-spacing: 2px;
    }

    /* Contenedor principal */
    .container {
      margin-top: 40px;
      text-align: center;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: block;
      margin: 0 auto 35px auto;
      max-width: 420px;
      width: 80%;
      opacity: 0.85;
    }

    /* Contenedor de texto */
    .text-block {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;
      font-size: 18px;
      line-height: 1.9;
    }

    /* CADA RENGLÓN con su propio degradado */
    .gradient-line {
      margin: 18px 0;

      background: linear-gradient(
        to bottom,
        #000065,
        #420089
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <img
      src="Nightmare on Schizo-Land 2.png"
      alt="Nightmare On Schizo-Land"
      class="logo"
    >

    <!-- TEXTO -->
    <div class="text-block">

      <div class="gradient-line">
        Bienvenido a Nightmare On Schizo-Land.
      </div>

      <div class="gradient-line">
        Este lugar no existe para ser entendido.
      </div>

      <div class="gradient-line">
        Cada palabra observa de vuelta.
      </div>

      <div class="gradient-line">
        Nada de esto ocurre por accidente.
      </div>

    </div>

  </div>

</body>
</html>
