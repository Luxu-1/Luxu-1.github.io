<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nightmare On Schizo-Land</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: serif;
      letter-spacing: 2px;
    }

    /* Contenedor principal */
    .container {
      margin-top: 40px;
      text-align: center;
      width: 100%;
    }

    /* Logo superior */
    .logo {
      display: block;
      margin: 0 auto 30px auto;
      max-width: 640px;
      width: 80%;
      opacity: 0.85;
    }

    /* Texto con degradado */
    .gradient-text {
      font-size: 18px;
      line-height: 1.8;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;

      background: linear-gradient(
        to bottom,
        #000065,
        #420089
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <img
      src="Nightmare on Schizo-Land 2.png"
      alt="Nightmare On Schizo-Land"
      class="logo"
    >

    <!-- TEXTO EDITABLE -->
    <div class="gradient-text">
      <p>
        Bienvenido a Nightmare On Schizo-Land.
      </p>

      <p>
        Este lugar no existe para ser entendido,  
        solo para ser observado.
      </p>

      <p>
        Nada de lo que veas acá está completamente quieto.
      </p>
    </div>

  </div>

</body>
</html>
